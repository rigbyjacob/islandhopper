  const track=el('div','',row);
  track.style.cssText='grid-column:1 / 3; position:relative; height:24px; margin-top:4px; border-radius:12px; cursor:pointer;'+
    'background:linear-gradient(90deg, #0c1226, #1a2c5a);';
  const handle=el('div','',track);
  handle.style.cssText='position:absolute; top:1px; width:22px; height:22px; transform:translateX(-50%); pointer-events:none;'+
    'filter:drop-shadow(0 0 5px rgba(150,180,255,0.7));';
  const cv=document.createElement('canvas'); cv.width=cv.height=22; cv.style.cssText='display:block;width:22px;height:22px;border-radius:50%';
  handle.appendChild(cv);
  function render(){ const t=Math.max(0,Math.min(1,obj[key])); handle.style.left=(6+t*88)+'%'; drawMoonPhase(cv,t); val.textContent=_moonPhaseName(t); val.title=Math.round(t*100)+'% lit'; }
  function setFromX(clientX){ const r=track.getBoundingClientRect(); let t=(clientX-r.left)/r.width; obj[key]=+Math.max(0,Math.min(1,t)).toFixed(2); render(); saveSettings(); }
  track.addEventListener('pointerdown', (e)=>{ track.setPointerCapture(e.pointerId); setFromX(e.clientX);
    const mv=(ev)=>setFromX(ev.clientX), up=()=>{ track.removeEventListener('pointermove',mv); track.removeEventListener('pointerup',up); };
    track.addEventListener('pointermove',mv); track.addEventListener('pointerup',up); });
  sliderRefs[key]={ render, val }; render();
}
function addToggle(parent, label, obj, key, onChange){
  const t=el('div','tg'+(obj[key]?' on':''),parent);
  el('div','box',t); const l=el('div','lab',t); l.textContent=label;
  t.onclick=()=>{ obj[key]=!obj[key]; t.classList.toggle('on',obj[key]); if(onChange) onChange(obj[key]); saveSettings(); };
  return t;
}
// labelled <select>; options = array of [value,label] (or plain strings)
function addSelect(parent, label, obj, key, options, onChange){
  const row=el('div','row',parent); const lab=el('label','',row); lab.textContent=label;
  const sel=document.createElement('select'); sel.className='routesel'; sel.style.gridColumn='1 / 3';
  for (const o of options){ const v=Array.isArray(o)?o[0]:o, tx=Array.isArray(o)?o[1]:o;
    const opt=document.createElement('option'); opt.value=v; opt.textContent=tx; sel.appendChild(opt); }
  sel.value=obj[key];
  sel.onchange=()=>{ obj[key]=sel.value; if(onChange) onChange(sel.value); saveSettings(); };
  row.appendChild(sel); return sel;
}

function updateReadouts(){
  const g=lastGuide;
  let est='';
  if (kf) { const e=kf.est, tc=sampleDisturb(boat3.x, boat3.z, clock.elapsedTime).cur;
    const cerr=Math.hypot(e.cx-tc.x, e.cz-tc.z);
    est = `<div class="read">ĉ ${Math.hypot(e.cx,e.cz).toFixed(1)} (err ${cerr.toFixed(1)}) · XTE ${(g.xte||0).toFixed(0)}m</div>`; }
  ui.read.innerHTML = `spd <b>${boat3.u.toFixed(1)}</b> / ${(g.desSpeed||0).toFixed(0)} &nbsp; `
    + `hdg <b>${((r2d(boat3.psi)%360+360)%360).toFixed(0)}°</b> &nbsp; → ${g.name||'—'}` + est;
}

// ============================================================================
// Telemetry graphs + compass
// ============================================================================
const TEL = []; const TEL_MAX = 320;
function recordTelemetry(t, herr, u, desSpeed){
  TEL.push({ t, herrDeg: r2d(herr), p: headingPID.p, i: headingPID.iTerm, d: headingPID.d,
    out: headingPID.out, u, desSpeed });
  if (TEL.length > TEL_MAX) TEL.shift();
}
const tcv = document.getElementById('telemetry'), tcx = tcv.getContext('2d');
function drawTelemetry(){
  const W=tcv.width, H=tcv.height; tcx.clearRect(0,0,W,H);
  const padL=6, padR=6, gw=W-padL-padR;
  const aT=6, aH=86, bT=aH+18, bH=80;   // two stacked graphs
  tcx.font='10px ui-monospace, monospace'; tcx.textBaseline='middle';
  // ---- graph A: heading error (deg, ±90 clamp) ----
  panelBg(padL,aT,gw,aH);
  zeroLine(padL,aT,gw,aH);
  tcx.fillStyle='rgba(220,238,251,.7)'; tcx.textAlign='left';
  tcx.fillText('heading error  ±90°', padL+5, aT+9);
  plot(TEL, d=>clampJS(d.herrDeg,-90,90)/90, padL,aT,gw,aH, '#ffe08a', 1.6);
  // ---- graph B: rudder P/I/D split (±deltaMax) ----
  panelBg(padL,bT,gw,bH);
  zeroLine(padL,bT,gw,bH);
  const sc = 1/BOAT.deltaMax;
  plot(TEL, d=>clampJS(d.p*sc,-1,1), padL,bT,gw,bH, '#ff7b7b', 1.2);   // P red
  plot(TEL, d=>clampJS(d.i*sc,-1,1), padL,bT,gw,bH, '#7be08a', 1.2);   // I green
  plot(TEL, d=>clampJS(d.d*sc,-1,1), padL,bT,gw,bH, '#7bb8ff', 1.2);   // D blue
  plot(TEL, d=>clampJS(d.out*sc,-1,1), padL,bT,gw,bH, '#ffffff', 1.8); // total white
  tcx.textAlign='left';
  tcx.fillStyle='#ff7b7b'; tcx.fillText('P', padL+5, bT+9);
  tcx.fillStyle='#7be08a'; tcx.fillText('I', padL+20, bT+9);
  tcx.fillStyle='#7bb8ff'; tcx.fillText('D', padL+33, bT+9);
  tcx.fillStyle='#ffffff'; tcx.fillText('= rudder', padL+46, bT+9);
}
function panelBg(x,y,w,h){ tcx.fillStyle='rgba(10,24,38,.45)'; tcx.fillRect(x,y,w,h); }
function zeroLine(x,y,w,h){ tcx.strokeStyle='rgba(150,200,255,.22)'; tcx.lineWidth=1;
  tcx.beginPath(); tcx.moveTo(x, y+h/2); tcx.lineTo(x+w, y+h/2); tcx.stroke(); }
function plot(arr, f, x, y, w, h, color, lw){
  if (arr.length<2) return; tcx.strokeStyle=color; tcx.lineWidth=lw; tcx.beginPath();
  for (let k=0;k<arr.length;k++){ const px=x + (k/(TEL_MAX-1))*w; const py=y+h/2 - f(arr[k])*(h/2-3);
    if(k===0) tcx.moveTo(px,py); else tcx.lineTo(px,py); }
  tcx.stroke();
}

const ccv=document.getElementById('compass'), ccx=ccv.getContext('2d');
function drawCompass(){
  const W=ccv.width, H=ccv.height, cx=W/2, cy=H/2, R=W/2-7; ccx.clearRect(0,0,W,H);
  // aged face + brass rims
  ccx.beginPath(); ccx.arc(cx,cy,R,0,7); ccx.fillStyle='rgba(26,20,11,.94)'; ccx.fill();
  ccx.lineWidth=3; ccx.strokeStyle='#c79a44'; ccx.beginPath(); ccx.arc(cx,cy,R,0,7); ccx.stroke();
  ccx.lineWidth=1; ccx.strokeStyle='#7a5e22'; ccx.beginPath(); ccx.arc(cx,cy,R-3,0,7); ccx.stroke();
  // rim ticks (long every 45°)
  for (let i=0;i<24;i++){ const a=i/24*Math.PI*2, long=(i%3===0), r0=R-4, r1=R-(long?10:6);
    ccx.strokeStyle=long?'#d8b25a':'#9a7a34'; ccx.lineWidth=long?1.5:1;
    ccx.beginPath(); ccx.moveTo(cx+Math.cos(a)*r0,cy+Math.sin(a)*r0); ccx.lineTo(cx+Math.cos(a)*r1,cy+Math.sin(a)*r1); ccx.stroke(); }
  // 8-point compass star
  ccx.fillStyle='rgba(184,144,62,.5)';
  for (let k=0;k<8;k++){ const a=k/8*Math.PI*2 - Math.PI/2, rr=(k%2===0)?R-13:R-30;
    ccx.beginPath(); ccx.moveTo(cx+Math.cos(a-0.13)*rr*0.34, cy+Math.sin(a-0.13)*rr*0.34);
    ccx.lineTo(cx+Math.cos(a)*rr, cy+Math.sin(a)*rr);
    ccx.lineTo(cx+Math.cos(a+0.13)*rr*0.34, cy+Math.sin(a+0.13)*rr*0.34); ccx.closePath(); ccx.fill(); }
  // serif cardinals
  ccx.fillStyle='#e6c879'; ccx.font='bold 12px Georgia, serif'; ccx.textAlign='center'; ccx.textBaseline='middle';
  const lr=R-15; ccx.fillText('N',cx,cy-lr); ccx.fillText('S',cx,cy+lr); ccx.fillText('E',cx+lr,cy); ccx.fillText('W',cx-lr,cy);
  // current / wind / desired indicators (kept)
  const arrow=(ang,len,color,lw,dashed)=>{ ccx.strokeStyle=color; ccx.lineWidth=lw; ccx.setLineDash(dashed?[4,3]:[]);
    const ex=cx+Math.cos(ang)*R*len, ey=cy+Math.sin(ang)*R*len;
    ccx.beginPath(); ccx.moveTo(cx,cy); ccx.lineTo(ex,ey); ccx.stroke();
    ccx.setLineDash([]); ccx.fillStyle=color; ccx.beginPath(); const a2=0.4; ccx.moveTo(ex,ey);
    ccx.lineTo(ex-Math.cos(ang-a2)*6, ey-Math.sin(ang-a2)*6);
    ccx.lineTo(ex-Math.cos(ang+a2)*6, ey-Math.sin(ang+a2)*6); ccx.fill(); };
  if (P.curOn) arrow(d2r(P.curDirDeg), 0.74, 'rgba(90,200,200,.85)', 2, false);
  if (kf) { const e=kf.est; if (Math.hypot(e.cx,e.cz)>0.3) arrow(Math.atan2(e.cz,e.cx), 0.58, 'rgba(123,224,138,.9)', 1.5, true); }
  if (P.windOn) arrow(d2r(P.windDirDeg), 0.64, 'rgba(230,240,255,.7)', 2, false);
  arrow(lastGuide.desPsi||0, 0.82, '#7fd0ff', 2, true);
  // boat heading as a two-tone compass needle
  const a=boat3.psi, needle=(ang,len,col)=>{ ccx.fillStyle=col;
    ccx.beginPath(); ccx.moveTo(cx+Math.cos(ang)*R*len, cy+Math.sin(ang)*R*len);
    ccx.lineTo(cx+Math.cos(ang+1.9)*5, cy+Math.sin(ang+1.9)*5);
    ccx.lineTo(cx+Math.cos(ang-1.9)*5, cy+Math.sin(ang-1.9)*5); ccx.closePath(); ccx.fill(); };
  needle(a, 0.82, '#d9433a'); needle(a+Math.PI, 0.72, '#efe6cf');
  ccx.fillStyle='#c79a44'; ccx.beginPath(); ccx.arc(cx,cy,3,0,7); ccx.fill();
}
</script>
<!-- Dev live-reload: poll a touchfile and reload when it changes. Localhost-only, so it does nothing
     when opened via file:// or deployed. Trigger with `just reload` (or `touch reload.txt`). -->
<script>
(function(){
  var host = location.hostname;
  var local = host === 'localhost' || host === '127.0.0.1' || host === '0.0.0.0' || host === '[::1]' || host === '::1';
  if (!local) { console.log('[live-reload] off (not localhost: "' + host + '")'); return; }
  console.log('[live-reload] watching reload.txt every 1s');
  var last = null;
  async function poll(){
    try {
      var r = await fetch('reload.txt?_=' + Date.now(), { cache: 'no-store' });
      if (!r.ok) { console.warn('[live-reload] reload.txt -> HTTP ' + r.status); return; }
      var v = (await r.text()).trim();          // compare CONTENTS (a timestamp), not headers
      if (last === null) { last = v; console.log('[live-reload] baseline ' + v); return; }
      if (v !== last) { console.log('[live-reload] change ' + last + ' -> ' + v + ', reloading'); location.reload(); }
    } catch(e) { console.warn('[live-reload] poll failed', e); }
  }
  setInterval(poll, 1000); poll();
})();
</script>
