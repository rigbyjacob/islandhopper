<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />

<title>Island Hopper</title>
<style>

  html, body { margin: 0; height: 100%; overflow: hidden; background: #06121f;

  #app { position: fixed; inset: 0; background: #000; }
  canvas { display: block; }

  /* composition grid overlay — UI layer above the canvas, never part of the video recording */
  #grid { position: fixed; pointer-events: none; z-index: 5; display: none; overflow: hidden; }
  #grid svg { display: block; width: 100%; height: 100%; }
  #grid line, #grid rect { stroke: rgba(255,255,255,.42); stroke-width: 1; }

  /* Brady-Bunch 4-up grid labels (overlay only; the split render is on the canvas) */
  #fleetgrid { position: fixed; inset: 0; z-index: 5; display: none; pointer-events: none;
    grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }
  #fleetgrid > div { border: 1px solid rgba(255,255,255,.14); padding: 8px 0 0 10px; }
  #fleetgrid .lab { display: inline-block; font-size: 12.5px; font-weight: 650; color: #eaf6ff;
    text-shadow: 0 1px 3px rgba(0,0,0,.85); background: rgba(8,20,33,.55); padding: 2px 9px; border-radius: 6px; }

  #labels { position: fixed; inset: 0; pointer-events: none; overflow: hidden; z-index: 4; }
  .ilabel { position: absolute; transform: translate(-50%, -50%); white-space: nowrap;
    font-size: 11px; font-weight: 600; letter-spacing: .2px; color: #f4fbff;
    text-shadow: 0 1px 2px rgba(0,0,0,.85), 0 0 6px rgba(0,40,70,.6);
    padding: 1px 5px; border-radius: 5px; background: rgba(10,28,46,.32);
    transition: color .4s, text-shadow .4s, background .4s; }
  .ilabel.target { color: #ff9a3c; font-weight: 700;
    text-shadow: 0 1px 2px rgba(0,0,0,.9), 0 0 10px rgba(255,140,40,.85);
    background: rgba(60,28,8,.42); }
  .clabel { position: absolute; transform: translate(-50%, -50%); white-space: nowrap;
    font-size: 9.5px; font-weight: 500; letter-spacing: .2px; color: #ffe0ad;
    text-shadow: 0 1px 2px rgba(0,0,0,.9); }
  .clabel::before { content: "•"; color: #ffce7a; margin-right: 3px; }

  .hud { position: fixed; pointer-events: none; color: #eaf6ff;
    text-shadow: 0 1px 3px rgba(0,0,0,.6); }
  #title { top: 17px; left: 120px; }
  #title h1 { margin: 0; font-size: 17px; font-weight: 650; letter-spacing: .2px; }
  #title p  { margin: 3px 0 0; font-size: 11.5px; opacity: .72; max-width: 330px; line-height: 1.35; }

  #hint { bottom: 12px; left: 16px; font-size: 11px; opacity: .8; line-height: 1.7; }

  #fsbtn { position: fixed; right: 12px; bottom: 14px; z-index: 130; width: 40px; height: 38px; display: flex; align-items: center; justify-content: center;

  #demobar .demo-cambtn:hover { background: rgba(140,200,255,.22); opacity: 1; }
  #demobar .demo-cambtn.active { background: #2f7bd6; border-color: #5b9fe6; color: #fff; opacity: 1; }
  .scn-input { width: 100%; box-sizing: border-box; background: rgba(0,0,0,.25); border: 1px solid rgba(140,200,255,.25); color: #dfeefb; border-radius: 7px; padding: 5px 8px; font: 12px ui-sans-serif; margin: 4px 0; }

  .routebox { width: 100%; box-sizing: border-box; margin: 4px 0; resize: vertical;

</style>

<!-- Classic script (runs before the module): catches module load/resolve failures,
     which the module's own handlers can't, plus a watchdog for a stalled boot. -->
<script>
  window.__booted = false;
  window.addEventListener('error', function (e) {
    if (window.__booted) return;
    var ov = document.getElementById('overlay'); if (!ov) return;
    var sp = ov.querySelector('.spinner'); if (sp) sp.style.display = 'none';
    var h = ov.querySelector('h2'); if (h) h.textContent = 'Could not start the simulator';
    var p = ov.querySelector('p'); if (p) p.textContent = 'A script failed to load or run. Details:';
    var eb = document.getElementById('err');
    if (eb) { eb.style.display = 'block';
      var msg = e && (e.message || e.error);
      eb.textContent = msg ? (msg + (e.filename ? '\n' + e.filename + ':' + (e.lineno||'') : '')) : String(e); }
  }, true);
  setTimeout(function () {
    if (window.__booted) return;
    var ov = document.getElementById('overlay'); if (!ov) return;
    var h = ov.querySelector('h2');
    if (h && h.textContent.indexOf('Could not') === -1) {
      h.textContent = 'Still loading…';
      var p = ov.querySelector('p'); if (!p) { p = document.createElement('p'); var bx = ov.querySelector('.box'); bx.insertBefore(p, document.getElementById('err')); }
      p.textContent =
        'Modules are taking a while. Check your connection, or open DevTools → Console for errors. Needs Chrome or Edge with WebGPU.';
    }
  }, 12000);
</script>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.webgpu.min.js",
    "three/webgpu": "https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.webgpu.min.js",
    "three/tsl": "https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.tsl.min.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.180.0/examples/jsm/"
  }

<script type="module">
import * as THREE from 'three';
import {
  Fn, float, vec2, vec3, vec4, sin, dot, max, min, mix, clamp, smoothstep, pow, reflect, exp, Loop,
  normalize, length, positionLocal, time, positionWorld, cameraPosition, oneMinus, attribute, uniform, uv, floor, fract,
  pass, mrt, output, normalView, texture, abs, screenUV, screenSize, cos,
  modelWorldMatrix, modelWorldMatrixInverse, shadow, lightShadowMatrix
} from 'three/tsl';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const errBox = document.getElementById('err');
function fatal(e) {
  console.error(e);
  const ov = document.getElementById('overlay');
  ov.classList.remove('hidden');
  ov.querySelector('.spinner').style.display = 'none';
  ov.querySelector('h2').textContent = 'Could not start the simulator';
  ov.querySelector('p').textContent = 'Your browser needs WebGPU or WebGL2 (use a recent Chrome/Edge). Details:';
  errBox.style.display = 'block';
  errBox.textContent = (e && (e.stack || e.message)) ? (e.stack || e.message) : String(e);
}
// If something throws while in the crow's-nest view, fall back to orbit instead of hard-crashing.
window.addEventListener('error', (ev) => {
  if (window.__booted && fpsMode) { console.warn('crow’s-nest error — reverting to orbit', ev.error||ev.message); try{ setView(false); }catch(_){ } return; }
  if (!window.__booted) fatal(ev.error || ev.message);
});
window.addEventListener('unhandledrejection', (ev) => {
  if (window.__booted && fpsMode) { console.warn('crow’s-nest error — reverting to orbit', ev.reason); try{ setView(false); }catch(_){ } return; }
  fatal(ev.reason);
});

// ============================================================================
// Tunable parameters (driven by the control panel)
// ============================================================================
const P = {
  hKp: 1.8, hKi: 0.05, hKd: 1.1,        // heading PID  (error rad -> rudder rad)

// ============================================================================
// Shared world model — ocean waves + island layout (used by GPU and CPU)
// ============================================================================
// Spread-spectrum ocean: 11 wavelets whose headings step by the golden angle
// (137.5°) so none line up, with geometric wavelengths, gravity-wave dispersion
// speeds, and a flattened amplitude spectrum so no single swell forms "corduroy"
// rows. The same params drive the GPU surface and the CPU sampler that floats the boat.
// Wide spectrum: LONG swells (≈180u) for the morphing distance look + SHORT chop (down to ≈20u) for
// close-up surface texture / normal detail. The earlier band-limit dropped the short waves and made
// the water read flat at grazing angles (uniform sky reflection). The flicker that prompted that was
// really the sea-skirt z-fight (fixed by lowering the skirt), NOT wave normals, so the chop is safe.
const WAVES = (() => {
  // Directions clustered within a ~±30° cone around ONE dominant swell heading, so the sea moves in
  // consistent directional patches instead of a chaotic crosshatch of every direction. (The golden-angle
  // full-circle spread we had made it interfere from all sides at once.) Longest swells hug the base
  // heading; shorter chop is allowed to fan out a bit more.
  const out = []; let len = 180; const baseDir = 22;
  const jit = [0, -10, 9, -18, 15, -26, 22, -7, 28, -15, 12];   // headings within ~±28° of baseDir
  for (let i=0;i<11;i++){          // 11 directional wavelets down to ~32u — surface texture without crosshatch
    const a = (baseDir + jit[i])*Math.PI/180, freq = (2*Math.PI)/len;
    out.push({ nx: Math.cos(a), ny: Math.sin(a), freq,
               amp: Math.sqrt(len)*0.025, speed: Math.sqrt(3.0*freq) });
    len *= 0.84;
  }
  return out;
})();
let seaAmp = 1.0;   // storm-reactive global wave-amplitude multiplier (mirrors GPU uSea)
let seaChop = 1.15; // Gerstner steepness (mirrors GPU uChop) — horizontal pinch toward crests
let seaEnv  = 0.95; // wave-height envelope strength (mirrors GPU uEnvAmt)
const ENV_FREQ = 1/430;
const WAVE_KSUM = WAVES.reduce((s,w)=>s+w.freq*w.amp, 0);   // Σ kᵢAᵢ → total trochoid steepness ≈ KSUM·seaAmp·chop; keep < 1 to avoid loops
// large-scale amplitude ENVELOPE (wave groups / sets): three slow crossing sine waves modulate wave
// height across the sea. Smooth sines (not hash noise) so this matches the GPU `waveEnv` closely in f32 —
// hash-of-large-sin diverges between GPU/CPU and floats the foam. Mean ≈ 1, spread by seaEnv.
function waveEnvJS(x, z, t){
  const s = Math.sin(x*0.0041 + z*0.0023 + t*0.05)
        + 0.7*Math.sin(x*-0.0017 + z*0.0033 - t*0.04)
        + 0.55*Math.sin(x*0.0026 + z*-0.0039 + t*0.035);
  return Math.max(0.05, 1 + seaEnv*0.42*s);
}
// Gerstner displacement in JS, mirroring the GPU `gerstner` Fn, so props (foam claws, etc.) ride the
// same peaked surface. Returns the world offset {dx,dy,dz} of the surface point parameterised at (x,z).
function gerstnerJS(x, z, t){
  let dx=0, dy=0, dz=0; const chop = uChop.value;   // use the clamped value the GPU uses, so claws stay glued
  for (const w of WAVES){ const ph=(x*w.nx + z*w.ny)*w.freq + t*w.speed;
    const c=Math.cos(ph)*w.amp*chop;
    dx += c*w.nx; dy += Math.sin(ph)*w.amp; dz += c*w.ny; }
  const e = seaAmp * waveEnvJS(x,z,t);
  return { dx:dx*e, dy:dy*e, dz:dz*e };
}
// Height of the Gerstner surface at a WORLD (wx,wz) position. Gerstner is parametric — the surface point
// that ENDS UP at world (wx,wz) came from a different parameter point — so we fixed-point invert the
// horizontal displacement (a few iterations) to find that parameter, then return its height. This is what
// lets props sit ON the leaning/​pinched front face instead of floating above where the param would be.
function seaSurfaceY(wx, wz, t){
  let px=wx, pz=wz;
  for (let i=0;i<3;i++){ const g=gerstnerJS(px,pz,t); px=wx-g.dx; pz=wz-g.dz; }
  return gerstnerJS(px,pz,t).dy;
}
// Jacobian determinant of the horizontal Gerstner map (mirrors GPU waveFold): <1 compressing, →0/neg = breaking.
function foldJS(x, z, t){
  let jxx=0, jxz=0, jzz=0; const chop=uChop.value;
  for (const w of WAVES){ const ph=(x*w.nx + z*w.ny)*w.freq + t*w.speed;
    const s = Math.sin(ph)*w.amp*w.freq*chop;
    jxx += -s*w.nx*w.nx; jxz += -s*w.nx*w.ny; jzz += -s*w.ny*w.ny; }
  const E = seaAmp*waveEnvJS(x,z,t);
  const a = 1+E*jxx, b = 1+E*jzz, c = E*jxz;
  return a*b - c*c;
}

function waveHeightJS(x, z, t) {
  let h = 0;
  for (const w of WAVES) h += Math.sin((x*w.nx + z*w.ny)*w.freq + t*w.speed) * w.amp;
  return h * seaAmp * waveEnvJS(x, z, t);   // amplitude envelope → wave groups / along-crest height variation
}

  desSpeed *= clampJS(1 - Math.abs(wrap(course - s.psi))*0.5, 0.4, 1);   // ease off for sharp turns so the hull can track the curve

  if (P.mode === 'tour' && arrived) { wpIdx = (wpIdx+1) % route.length; boat3.recoverCount = 0; }
  if (P.mode === 'goto' && arrived) desSpeed = 0;
  const name = P.mode === 'goto' ? 'destination' : route[wpIdx].name;
  return { desPsi, desSpeed, course, dist: dArrive, name, xte: aim.xte, arrived };
}

// ---- "electric motor" assist: a cheating kinematic controller that takes over when the boat's hull
// physics can't make the turn (tight corner into an island) or has touched land. It turns/accelerates
// far harder than the rudder allows to glue the boat to the planned path, and slides off any shoal toward
// deeper water — then hands back to the realistic PID once we're cruising open water again.
function deeperDir(x,z){ const e=GRID.dx;
  const gx=-(terrainHeight(x+e,z)-terrainHeight(x-e,z)), gz=-(terrainHeight(x,z+e)-terrainHeight(x,z-e));
  const m=Math.hypot(gx,gz)||1; return { x:gx/m, z:gz/m }; }   // unit vector toward deeper water
function runAssist(s, dt, t, g){
  const clear = -terrainHeight(s.x,s.z) - P.draft;            // floating clearance (negative if pinned on a shoal)
  const dd = deeperDir(s.x,s.z), deepAng = Math.atan2(dd.z, dd.x);
  const wDeep = clampJS((3 - clear)/4, 0, 1);                 // 1 aground → 0 once we have ~3u clearance: steer to deep, else to the path
  const tgtAng = g.course + wrap(deepAng - g.course)*wDeep;   // smooth blend (no snapping)
  const turn = clampJS(wrap(tgtAng - s.psi), -1.1*dt, 1.1*dt);
  s.psi = wrap(s.psi + turn); s.r = turn/Math.max(dt,1e-3);
  const tgtU = (wDeep>0.4 ? 4.5 : clampJS(g.desSpeed,3,8));
  s.u += clampJS(tgtU - s.u, -5*dt, 5*dt); s.v = 0;
  const nx = s.x + Math.cos(s.psi)*s.u*dt, nz = s.z + Math.sin(s.psi)*s.u*dt;
  if (-terrainHeight(nx,nz) >= P.draft){ s.x = nx; s.z = nz; }   // only ever move into water; if pinned, just keep turning toward deep
  s.grounded = false;
}

// Sun-shadow colour MULTIPLIER (1 = lit, <1 in the sun's shadow) for unlit / hand-authored materials (the water and
// the custom-shaded terrain). It samples the sun shadow map manually AND masks to inside the map's [0,1] footprint, so
// surfaces beyond the region (open ocean) read as LIT instead of the shadow node's out-of-bounds "occluded" — that
// out-of-bounds darkening was the hard rectangle. `gate` optionally restricts the effect (e.g. above the waterline).
function _sunShadowMul(gate){
  if (!sunLight) return float(1);
  const ss = lightShadowMatrix(sunLight).mul(vec4(positionWorld.x, positionWorld.y, positionWorld.z, float(1)));
  const u = ss.x.div(ss.w), v = ss.y.div(ss.w);

function buildSky() {
  const geo = new THREE.SphereGeometry(5200, 40, 24);
  skyMat = new THREE.MeshBasicNodeMaterial({ side: THREE.BackSide, depthWrite: false });
  skyMat.fog = false;                                   // dome must not be fogged into white
  // colourNode wrapped in Fn() so the sun-glow addAssign actually runs (top-level assigns are dropped
  // by TSL — that's why the sky was a flat, washed gradient with no sun glow/disk).
  skyMat.colorNode = Fn(() => {
    const vd = normalize(positionLocal);
    // tiny-planet: bias the view elevation up by uHorizonDrop so the whole sky (horizon band + sun + moon) appears
    // LOWER, rising from the curved sea horizon instead of the flat one. 0 when curvature is off.
    const grad = smoothstep(-0.05, 0.38, vd.y.add(uHorizonDrop));      // reach the blue zenith sooner → less washed-out
    const col = mix(uHorizon, uZenith, grad).toVar();
    const sunV = normalize(vec3(uSunDir.x, uSunDir.y.sub(uHorizonDrop), uSunDir.z));   // visual sun disk dips with the horizon
    const sd = max(dot(vd, sunV), 0.0);
    // tight disk core blows out to white at any intensity; at sunset (uWarm→1) dim it hard so the ruddy uSunCol shows
    // through as a deep-red ball instead of a white moon. Broad warm halo stays.
    const glow = pow(sd, 13.0).mul(0.30).add(pow(sd, 280.0).mul(mix(7.0, 1.4, uWarm)));
    col.addAssign(uSunCol.mul(glow).mul(uSunInt));
    // moon — small cool disk + faint halo, rises at night
    const moonV = normalize(vec3(uMoonDir.x, uMoonDir.y.sub(uHorizonDrop), uMoonDir.z));
    const md = max(dot(vd, moonV), 0.0);
    const vgNight = uVangogh.mul(smoothstep(0.12, -0.10, uSunDir.y.sub(uHorizonDrop)));   // Starry-Night sky active (vangogh + sun down)
    const mglow = pow(md, 40.0).mul(0.10).add(pow(md, 320.0).mul(0.7));   // soft halo only — the textured moon mesh draws the disk itself
    col.addAssign(uMoonCol.mul(mglow).mul(uMoonInt).mul(oneMinus(vgNight)));   // ordinary moon suppressed under the Van Gogh sky (a warm one is drawn below)
    // ---- ATMOSPHERE: warm horizon haze — a glowing band hugging the horizon, brightest toward the sun and swelling
    // at sunset (uWarm), scaled by the Atmosphere slider. Reliable golden-hour glow, independent of god-ray contrast.
    const hzBand = smoothstep(0.32, -0.05, vd.y.add(uHorizonDrop));          // 1 at/below the horizon → 0 up the sky
    const azSun  = max(dot(normalize(vec3(vd.x, 0.001, vd.z)), normalize(vec3(sunV.x, 0.001, sunV.z))), 0.0);
    const haze   = hzBand.mul(mix(float(0.22), float(1.0), pow(azSun, 2.2))).mul(uAtmo).mul(uWarm.mul(0.75).add(0.25));

    const cloudMask = smoothstep(0.56, 0.82, streak).mul(skyWin).mul(uAtmo.mul(0.5).add(0.4));

function makeMoonTexture(){

  rainLocal = uRain.value;                             // raindrop particles ride the same felt-storm intensity
  // ---- lightning: random strikes under the stormiest cells; a bolt column + flash that lights the scene ----

// ---- raindrop particle system: instanced falling streaks (varying sizes, wind-slanted) localized around
//      the boat under a storm cell, with splash/ripple rings where each drop strikes the sea ----
function buildRain(){
  const N=420;
  const g=new THREE.PlaneGeometry(1,1);
  const mat=new THREE.MeshBasicMaterial({ map:makeStreakTexture(), color:0xcdddf0, transparent:true, opacity:0.6, depthWrite:false, side:THREE.DoubleSide, fog:true });
  rainMesh=new THREE.InstancedMesh(g, mat, N); rainMesh.frustumCulled=false; rainMesh.count=0; rainMesh.renderOrder=1; scene.add(rainMesh);
  for(let i=0;i<N;i++) rainDrops.push({ x:0,y:0,z:0, active:false, spd:120+Math.random()*90, len:5+Math.random()*11, wid:0.16+Math.random()*0.18 });
  const ringTex=makeRingTexture(), rg=new THREE.PlaneGeometry(1,1); rg.rotateX(-Math.PI/2);
  for(let i=0;i<80;i++){ const m=new THREE.Mesh(rg, new THREE.MeshBasicMaterial({ map:ringTex, color:0xdaeaf8, transparent:true, opacity:0, depthWrite:false, fog:true }));
    m.visible=false; m.renderOrder=1; scene.add(m); splashPool.push({ mesh:m, life:0, dur:0.5 }); }
}
function spawnSplash(x,y,z){ for(const s of splashPool){ if(s.life<=0){ s.dur=0.42+Math.random()*0.26; s.life=s.dur;
  s.mesh.position.set(x, y+0.15, z); s.mesh.scale.set(2,2,1); s.mesh.material.opacity=0.6; s.mesh.visible=true; return; } } }
function updateSplashes(dt){ for(const s of splashPool){ if(s.life>0){ s.life-=dt; const k=1-s.life/s.dur;
  const sc=2+k*11; s.mesh.scale.set(sc,sc,1); s.mesh.material.opacity=Math.max(0,(1-k)*0.6); s.mesh.visible=s.life>0; } else s.mesh.visible=false; } }
function updateRain(dt){
  if(!rainMesh) return;
  const on = (P.showRainParticles!==false) && rainLocal>0.04;
  if(!on){ rainMesh.count=0; rainMesh.visible=false; updateSplashes(dt); return; }   // let existing splashes finish, no new drops
  rainMesh.visible=true;
  const t=clock.elapsedTime, cam=activeCam||camera, cx=boat3.x, cz=boat3.z, BOX=85, TOP=150;
  const wx=Math.cos(d2r(P.windDirDeg)), wz=Math.sin(d2r(P.windDirDeg)), wdrift=8+P.windStrength*3;
  const want=Math.max(0, Math.min(rainDrops.length, Math.floor(rainLocal*rainDrops.length)));
  for(let i=0;i<want;i++){ const d=rainDrops[i];
    if(!d.active){ d.active=true; d.x=cx+(Math.random()-0.5)*2*BOX; d.z=cz+(Math.random()-0.5)*2*BOX; d.y=Math.random()*TOP; }
    d.y -= d.spd*dt; d.x += wx*wdrift*dt; d.z += wz*wdrift*dt;
    const seaY=waveHeightJS(d.x, d.z, t) - curveDropJS(d.x, d.z);   // strike the CURVED sea surface
    if(d.y<=seaY){ spawnSplash(d.x, seaY, d.z); d.y=TOP; d.x=cx+(Math.random()-0.5)*2*BOX; d.z=cz+(Math.random()-0.5)*2*BOX; }
    _rd.position.set(d.x, d.y, d.z); _rd.rotation.set(0, Math.atan2(cam.position.x-d.x, cam.position.z-d.z), 0);
    _rd.scale.set(d.wid, d.len, 1); _rd.updateMatrix(); rainMesh.setMatrixAt(i, _rd.matrix);
  }
  rainMesh.count=want; rainMesh.instanceMatrix.needsUpdate=true;
  updateSplashes(dt);
}

// perlin/fbm-noise puff — wispy, billowy alpha (for smoke/ash so it doesn't read as flat round blobs)
function makeSmokeTexture(){
  const N=128, c=document.createElement('canvas'); c.width=c.height=N; const ctx=c.getContext('2d');
  const img=ctx.createImageData(N,N), d=img.data;
  for(let j=0;j<N;j++) for(let i=0;i<N;i++){ const u=i/N-0.5, v=j/N-0.5, rr=Math.hypot(u,v)*2;
    let n=fbm(i*0.05+11.3, j*0.05+4.7);                       // fractal value noise → billows
    n=clampJS((n-0.25)*1.7, 0, 1);
    const fall=clampJS(1-rr, 0, 1);                           // round it off at the edges
    const o=(j*N+i)*4; d[o]=d[o+1]=d[o+2]=255; d[o+3]=Math.round(255*n*fall*fall); }
  ctx.putImageData(img,0,0); return new THREE.CanvasTexture(c);
}
// soft FIREBALL sprite: a feathered radial core (bright centre → fully transparent, fuzzy edge) with a little fbm churn.
// White so each sprite's material.color can tint it by heat; the squared falloff gives gaseous, non-hard-edged blobs.
function makeFireballTexture(){
  const N=128, c=document.createElement('canvas'); c.width=c.height=N; const ctx=c.getContext('2d');
  const img=ctx.createImageData(N,N), d=img.data;
  for(let j=0;j<N;j++) for(let i=0;i<N;i++){ const u=i/N-0.5, v=j/N-0.5, rr=Math.hypot(u,v)*2;
    const core=clampJS(1-rr,0,1);                              // 1 centre → 0 edge

// ---- palm trees: one merged trunk+fronds geometry, scattered on island lowlands via InstancedMesh ----
function setGeoColor(geo, hex){ const c=new THREE.Color(hex), n=geo.attributes.position.count, arr=new Float32Array(n*3);
  for(let i=0;i<n;i++){ arr[i*3]=c.r; arr[i*3+1]=c.g; arr[i*3+2]=c.b; } geo.setAttribute('color', new THREE.BufferAttribute(arr,3)); return geo; }
function mergeGeos(geos){
  let vc=0, ic=0; for(const g of geos){ vc+=g.attributes.position.count; ic+=g.index?g.index.count:g.attributes.position.count; }
  const pos=new Float32Array(vc*3), nor=new Float32Array(vc*3), col=new Float32Array(vc*3), idx=new Uint32Array(ic);
  let vo=0, io=0;
  for(const g of geos){ const p=g.attributes.position, nm=g.attributes.normal, c=g.attributes.color;
    for(let i=0;i<p.count;i++){ pos[(vo+i)*3]=p.getX(i); pos[(vo+i)*3+1]=p.getY(i); pos[(vo+i)*3+2]=p.getZ(i);
      if(nm){ nor[(vo+i)*3]=nm.getX(i); nor[(vo+i)*3+1]=nm.getY(i); nor[(vo+i)*3+2]=nm.getZ(i); }
      if(c){ col[(vo+i)*3]=c.getX(i); col[(vo+i)*3+1]=c.getY(i); col[(vo+i)*3+2]=c.getZ(i); } }
    if(g.index){ for(let i=0;i<g.index.count;i++) idx[io+i]=g.index.getX(i)+vo; io+=g.index.count; }
    else { for(let i=0;i<p.count;i++) idx[io+i]=vo+i; io+=p.count; }
    vo+=p.count; }
  const out=new THREE.BufferGeometry();
  out.setAttribute('position', new THREE.BufferAttribute(pos,3));
  out.setAttribute('normal', new THREE.BufferAttribute(nor,3));
  out.setAttribute('color', new THREE.BufferAttribute(col,3));
  out.setIndex(new THREE.BufferAttribute(idx,1)); return out;
}
function makePalm(o){   // o: {trunkH, lean, nf, frondLen, droop, trunkR}
  const geos=[];
  const trunk=new THREE.CylinderGeometry(o.trunkR*0.5, o.trunkR, o.trunkH, 6); trunk.translate(0,o.trunkH/2,0);
  trunk.rotateZ(o.lean); setGeoColor(trunk, 0x7a5230); geos.push(trunk);
  const tx=Math.sin(o.lean)*o.trunkH, ty=Math.cos(o.lean)*o.trunkH;     // trunk top after the lean
  for (let k=0;k<o.nf;k++){
    const fr=new THREE.ConeGeometry(o.frondLen*0.13, o.frondLen, 4); fr.scale(1,1,0.3); fr.translate(0, o.frondLen*0.5, 0);
    fr.rotateZ(-Math.PI/2 - o.droop);                 // droop the leaf DOWNWARD (gravity), not arching up
    fr.rotateY(k/o.nf*Math.PI*2 + Math.random()*0.25);
    fr.translate(tx, ty, 0);
    setGeoColor(fr, k%2 ? 0x3f7d34 : 0x4f9440); geos.push(fr);
  }
  return mergeGeos(geos);
}
function buildPalms(){

  const geos=[];
  for (const ct of CITIES){

        const cap=new THREE.BoxGeometry(w*1.04, 0.18, dp*1.04); cap.translate(x, base+h+0.09, z); setGeoColor(cap, roofCol); geos.push(cap);

function _updateMusic(dt){

    const g=new THREE.BufferGeometry();

    return g;   // MeshBasic is unlit → no normals needed
  }

  const G=7, R=120, NS=Math.floor(2*R/G)+1, CAP=2600;   // denser candidate grid + a big instance pool → lots more fingers
  const core  = new THREE.InstancedMesh(fingerGeo(0.150), new THREE.MeshBasicMaterial({color:WHITE}), CAP);
  // inverted-hull keyline: a FATTER tube rendered BACK-faces-only, so the dark only shows as a rim
  // around the white core's silhouette (a concentric solid tube would just bury the white inside it).
  const shell = new THREE.InstancedMesh(fingerGeo(0.210), new THREE.MeshBasicMaterial({color:DARK, side:THREE.BackSide}), CAP);
  for (const m of [core, shell]){ m.frustumCulled=false; m.count=CAP; m.visible=false; }
  shell.renderOrder = 2; core.renderOrder = 3;   // shell (rim) first, white core on top
  scene.add(shell); scene.add(core);
  foamClaws = { core, shell, prop, ampSum, G, R, NS, CAP };
}

function updateFoamClaws(t){
  if (!foamClaws) return;
  if (!fingersOn || P.style !== 'hokusai'){ if (foamClaws.core.visible){ foamClaws.core.visible=false; foamClaws.shell.visible=false; } return; }
  foamClaws.core.visible = true; foamClaws.shell.visible = true;

  const { core, shell, prop, ampSum, G, NS } = foamClaws;
  const cam = activeCam || camera;
  const cx = Math.round(cam.position.x/G)*G, cz = Math.round(cam.position.z/G)*G;   // snap grid to camera
  const half = (NS-1)/2;
  const e = 2.0, CAP = foamClaws.CAP;
  const denom  = Math.max(ampSum*seaAmp, 1e-3);     // normalise crest height by sea state so density doesn't saturate
  const gref   = Math.max(WAVE_KSUM*seaAmp, 1e-4);  // gradient scale by sea state
  const seaScl = clampJS(seaAmp/2.5, 0.55, 2.1);    // claws grow with the sea

  // PASS 1 — detect crest cells by RELATIVE height (sea-state independent → no saturation when waves grow)
  const crests = _clawCrests; crests.length = 0;
  for (let gi=0; gi<NS; gi++) for (let gj=0; gj<NS; gj++){
    const x0 = cx + (gi-half)*G, z0 = cz + (gj-half)*G;
    const wi = Math.round(x0/G), wj = Math.round(z0/G);
    const x = x0 + (_hash2(wi*2+1, wj*2+9)-0.5)*G*0.9;
    const z = z0 + (_hash2(wi*2+7, wj*2+3)-0.5)*G*0.9;
    const h = waveHeightJS(x, z, t);
    const heightN = smoothstepJS(0.10, 0.38, h/denom);             // crests rarely reach the theoretical max → centre low
    if (heightN <= 0.001) continue;
    const gx = (waveHeightJS(x+e,z,t)-waveHeightJS(x-e,z,t))/(2*e);
    const gz = (waveHeightJS(x,z+e,t)-waveHeightJS(x,z-e,t))/(2*e);
    const steepN = smoothstepJS(0.25, 0.75, Math.hypot(gx,gz)/gref);
    const dwn = (gx*prop.x + gz*prop.z)/gref;                       // down-wave slope (<0 on the breaking front)
    const frontN = smoothstepJS(0.20, -0.40, dwn);
    const foldN  = smoothstepJS(0.92, 0.18, foldJS(x,z,t));         // surface overturning → actually breaking here
    const score = heightN * (0.45 + 0.55*steepN) * (0.55 + 0.45*frontN) * (0.45 + 0.75*foldN);
    if (score <= 0.07) continue;
    crests.push(x, z, h, score, wi, wj);
  }

  // PASS 2 — FRACTAL clusters of fingers per crest: power-law sizes (many small, few large), 2-octave
  // jittered positions (no grid/row signature), bases sunk into the foam so they connect, varied tilt.
  const fwdx = prop.x*curlSign, fwdz = prop.z*curlSign;        // FORWARD = wave travel (× curlSign). Fingers sit on this
  _clX.set(fwdx, 0, fwdz).normalize();                         // (leading) side and arch this way — flip both with dev.curl()
  _clZ.crossVectors(_clX, _clUp).normalize();
  _clY.crossVectors(_clZ, _clX).normalize();
  _clMat.makeBasis(_clX, _clY, _clZ);
  const _qBase = new THREE.Quaternion().setFromRotationMatrix(_clMat);
  let k = 0;
  for (let c=0; c<crests.length && k<CAP-10; c+=6){
    const cxw=crests[c], czw=crests[c+1], score=crests[c+3], wi=crests[c+4], wj=crests[c+5];
    const nf = 2 + (_hash2(wi+13, wj+29)*7 | 0);                          // 2..8 fingers — denser, uneven hands
    const clusterSc = (1.6 + 2.6*score) * seaScl;                        // hand size scales with crest strength + sea state
    // crest's WORLD position (Gerstner-displaced), then push the hand forward in WORLD space onto the fore-lip
    const gC = gerstnerJS(cxw, czw, t);
    const cwx = cxw + gC.dx, cwz = czw + gC.dz;
    const wShift = frontFace * (3.0 + 2.5*seaScl);                       // WORLD-space forward push (predictable; not pinched away)
    const lwx = cwx + fwdx*wShift, lwz = cwz + fwdz*wShift;
    for (let f=0; f<nf && k<CAP; f++){
      const a=_hash2(wi*3+f*17+1, wj*3+f*7+5), b=_hash2(wi*5+f*11+2, wj*5+f*13+8),
            g3=_hash2(wi+f*23+3, wj+f*19+9), g4=_hash2(wi*7+f*5+4, wj*7+f*3+6);
      const sprC = clusterSc*1.3, sprF = clusterSc*0.45;                 // coarse hand offset + fine wiggle (2 octaves)
      const wx = lwx + (a-0.5)*sprC + (g3-0.5)*sprF;                     // scatter in WORLD space
      const wz = lwz + (b-0.5)*sprC + (g4-0.5)*sprF;
      const sc = clusterSc * (0.30 + 0.70*Math.pow(g3,2.4));            // power-law → mostly small, a few big
      if (sc < 0.25) continue;
      _clQ.copy(_qBase);
      _clQ2.setFromAxisAngle(_clZ, 0.85 + a*0.5); _clQ.multiply(_clQ2);   // STRONG forward arch (~49°..77°) → pitches over the front
      _clQ2.setFromAxisAngle(_clUp, (b-0.5)*1.3); _clQ.premultiply(_clQ2); // ±37° yaw → irregular but still reads as one breaking edge
      const surfY = seaSurfaceY(wx, wz, t);                              // true Gerstner surface height at this WORLD point (inverse)
      _clObjSet(wx, surfY + fingerLift*sc - curveDropJS(wx, wz), wz, _clQ, sc);  // sit on the lip and EMERGE (lift scales with size)
      core.setMatrixAt(k, _clObj.matrix); shell.setMatrixAt(k, _clObj.matrix); k++;
    }
  }
  // park unused instances out of view
  _clObj.position.set(0,-9999,0); _clObj.quaternion.identity(); _clObj.scale.setScalar(0); _clObj.updateMatrix();
  for (; k<CAP; k++){ core.setMatrixAt(k, _clObj.matrix); shell.setMatrixAt(k, _clObj.matrix); }
  core.instanceMatrix.needsUpdate = true; shell.instanceMatrix.needsUpdate = true;
}

// ============================================================================
//  HERO BREAKERS — authored curling waves with TRUE overhang.
//  Gerstner sharpens crests but can't fold a single-valued surface back over itself.
//  So the few biggest crests get a sculpted breaking-wave mesh: a sheet that rises up
//  the face (deep Prussian-blue) and curls forward into a barrel with a white, frilled
//  lip — the Great Wave's overhanging claw as a real object. Placed on the top-scored
//  crests (spaced apart), oriented down-wave, riding the Gerstner-displaced surface.
// ============================================================================
let breakers = null;
let breakersOn = true;    // authored hero breakers (unlit blue→white curl) — on; dev.breakers(false) to hide
function buildBreakers(){
  const mix3=(a,b,s)=>[a[0]+(b[0]-a[0])*s, a[1]+(b[1]-a[1])*s, a[2]+(b[2]-a[2])*s];
  const cDeep=[0.063,0.157,0.337], cMid=[0.149,0.310,0.576], cPale=[0.655,0.780,0.906], cWhite=[0.968,0.949,0.902], cInk=[0.043,0.090,0.205];
  function breakerGeo(){
    const NU=24, NV=20, THETA=2.95, H=1.0, W=2.6;    // profile/​width res; THETA≈169° → rises, peaks, just tips over (open curl, not a closed barrel)
    const pos=[], col=[], idx=[];
    for (let i=0;i<=NU;i++){ const u=i/NU, ang=u*THETA;
      const px = H*(u*0.18 + 0.98*(1-Math.cos(ang)));   // progress forward as it curls
      const py = H*(1.20*Math.sin(ang));                // up then over (sin past 90° comes back down → overhang)
      let c;                                            // deep-blue face → pale → white frilled lip; ink at the very tip
      if (u<0.5)        c = mix3(cDeep, cMid,  u/0.5);
      else if (u<0.72)  c = mix3(cMid,  cPale, (u-0.5)/0.22);
      else if (u<0.93)  c = mix3(cPale, cWhite,(u-0.72)/0.21);
      else              c = mix3(cWhite, cInk, (u-0.93)/0.07);   // thin dark keyline along the breaking edge
      for (let j=0;j<=NV;j++){ const v=j/NV;
        const lip = Math.max(0,(u-0.74)/0.26);
        const frill = lip>0 ? Math.sin(v*Math.PI*9.0)*0.13*lip + Math.sin(v*Math.PI*23.0)*0.04*lip : 0;   // ragged finger lip
        pos.push(px + frill*0.7, py + frill, (v-0.5)*W);
        col.push(c[0],c[1],c[2]);
      }
    }
    for (let i=0;i<NU;i++) for (let j=0;j<NV;j++){
      const a=i*(NV+1)+j, b=a+1, cc=a+(NV+1), d=cc+1; idx.push(a,cc,b, b,cc,d); }
    const g=new THREE.BufferGeometry();
    g.setAttribute('position', new THREE.Float32BufferAttribute(pos,3));
    g.setAttribute('color',    new THREE.Float32BufferAttribute(col,3));
    g.setIndex(idx);
    return g;
  }
  const CAPB=5;
  // UNLIT material: the baked deep-blue→white vertex gradient IS the shading (flat ukiyo-e look), so there are
  // no normal artifacts on the double-sided curl (the lit version went muddy). The curl silhouette gives the form.
  const mat=new THREE.MeshBasicNodeMaterial({ side:THREE.DoubleSide });
  mat.colorNode = attribute('color','vec3');
  const mesh=new THREE.InstancedMesh(breakerGeo(), mat, CAPB);
  mesh.frustumCulled=false; mesh.count=CAPB; mesh.visible=false; mesh.renderOrder=1;   // under the claw lip (renderOrder 2/3)
  scene.add(mesh);
  breakers = { mesh, CAPB };
}

function updateBreakers(t){
  if (!breakers || !foamClaws) return;
  if (!breakersOn || P.style !== 'hokusai'){ if (breakers.mesh.visible) breakers.mesh.visible=false; return; }
  breakers.mesh.visible = true;
  const { mesh, CAPB } = breakers, cr = _clawCrests;
  const cam = activeCam || camera;
  const seaScl = clampJS(seaAmp/2.5, 0.55, 2.1);     // breakers grow with the sea, like the claws
  // pick the top-scored crests this frame (foam pass already filled _clawCrests), spaced apart
  const idxs=[]; for (let c=0;c<cr.length;c+=6) idxs.push(c);
  idxs.sort((p,q)=>cr[q+3]-cr[p+3]);
  const picked=[]; let n=0;
  for (const c of idxs){ if (n>=CAPB) break;
    const x=cr[c], z=cr[c+1], sc=cr[c+3];              // sc = crest score (0..~1)
    if (sc < 0.5) break;                               // only the strongest crests become hero breakers
    let ok=true; for (const p of picked){ if (Math.hypot(x-p[0],z-p[1])<80){ ok=false; break; } }
    if (!ok) continue; picked.push([x,z]);
    const gd=gerstnerJS(x,z,t), wx=x+gd.dx, wz=z+gd.dz;
    // CHEAT THE FACING: curl toward the camera so its blue concave face + white lip turn to the viewer
    // (Great-Wave framing) instead of showing the plain back as the boat travels down-wave.
    let fx=cam.position.x-wx, fz=cam.position.z-wz; const fl=Math.hypot(fx,fz)||1; fx/=fl; fz/=fl;
    _clX.set(fx,0,fz); _clZ.crossVectors(_clX,_clUp).normalize(); _clY.crossVectors(_clZ,_clX).normalize();
    _clMat.makeBasis(_clX,_clY,_clZ);
    _clQ.setFromRotationMatrix(_clMat);
    _clQ2.setFromAxisAngle(_clZ, -0.15); _clQ.multiply(_clQ2);        // tip the crest slightly back for a leaning-wave silhouette
    const scale = (3.0 + sc*2.2)*seaScl, wide = 0.9 + _hash2((x|0)+5,(z|0)+9)*1.1;
    _clObj.position.set(wx, gd.dy - curveDropJS(wx,wz) - 0.5, wz);
    _clObj.quaternion.copy(_clQ);
    _clObj.scale.set(scale, scale, scale*wide);
    _clObj.updateMatrix(); mesh.setMatrixAt(n, _clObj.matrix); n++;
  }
  _clObj.position.set(0,-9999,0); _clObj.quaternion.identity(); _clObj.scale.setScalar(0); _clObj.updateMatrix();
  for (; n<CAPB; n++) mesh.setMatrixAt(n, _clObj.matrix);
  mesh.instanceMatrix.needsUpdate = true;
}

// ---- Hokusai foam-claw texture: white claws with a DARK INDIGO KEYLINE baked into the ART (so every tendril has a
// real edge — noise alone can't leave a rim). Tileable (wrap copies). Stamped along the wave crests in the shader. ----
function buildHokusaiFoamTexture(){
  const S=512, cv=document.createElement('canvas'); cv.width=cv.height=S;
  const g=cv.getContext('2d'); g.clearRect(0,0,S,S);
  const DARK='#14305c', WHITE='#f7f2e6';
  g.lineJoin='round'; g.lineCap='round';
  // one foam "claw": a curling comma tail rising into a cluster of beads, white-filled with a dark keyline stroke
  function claw(px,py,rot,sc){
    g.save(); g.translate(px,py); g.rotate(rot); g.scale(sc,sc);
    g.fillStyle=WHITE; g.strokeStyle=DARK; g.lineWidth=5.5;
    g.beginPath();                                   // comma/curl body
    g.moveTo(0,10);
    g.quadraticCurveTo(3,-4, 13,-12);
    g.quadraticCurveTo(22,-20, 18,-31);
    g.quadraticCurveTo(14,-40, 4,-39);
    g.quadraticCurveTo(-4,-38, -2,-29);
    g.quadraticCurveTo(2,-18, -5,-10);
    g.quadraticCurveTo(-11,-2, -7,9);
    g.closePath(); g.fill(); g.stroke();
    for(const [bx,by,r] of [[9,-33,6.5],[1,-37,5],[-5,-31,4.5],[13,-27,4.5],[5,-24,3.8],[16,-34,3.4]]){
      g.beginPath(); g.arc(bx,by,r,0,7); g.fill(); g.stroke(); }   // bead curl tips
    g.restore();
  }
  let seed=7; const rnd=()=>{ seed=(seed*48271)%2147483647; return seed/2147483647; };
  for(let i=0;i<24;i++){ const px=rnd()*S, py=rnd()*S, rot=rnd()*6.2832, sc=0.5+rnd()*0.75;
    for(const dx of [-S,0,S]) for(const dy of [-S,0,S]) claw(px+dx,py+dy,rot,sc); }   // wrap copies → seamless tile
  const tex=new THREE.CanvasTexture(cv);
  tex.wrapS=tex.wrapT=THREE.RepeatWrapping; tex.colorSpace=THREE.SRGBColorSpace;
  // NO mipmaps — mip-blur was eating the thin dark keyline at distance, leaving soft white blobs. Linear keeps the rim crisp.
  tex.generateMipmaps=false; tex.minFilter=THREE.LinearFilter; tex.magFilter=THREE.LinearFilter; tex.anisotropy=8; tex.needsUpdate=true;
  return tex;
}
function buildOcean() {
  const geo = new THREE.PlaneGeometry(5600, 4000, 540, 380);   // wide enough to cover past Puerto Rico
  geo.rotateX(-Math.PI/2); geo.translate(MAP.cx, 0, MAP.cz);
  const bathyTex = buildBathyTexture();
  const hkFoamTex = buildHokusaiFoamTexture();   // pre-drawn Hokusai claws (white + dark keyline) stamped on the crests
  // soft CIRCULAR bathymetry border, centred on the seabed mesh, kept inside the data region so it never
  // hits the texture edge (which caused the white contour ring). Large radius — fades far out in deep water.
  const BCX=MAP.cx, BCZ=MAP.cz, BR0=1150, BR1=1560;

  // wave-height ENVELOPE (groups / sets): three slow, large-scale crossing sine waves modulate wave
  // amplitude across the sea — towering crests in some patches, near-flat water in others, and height
  // variation ALONG a single crest. Smooth sines (NOT hash noise) so the value matches bit-for-bit
  // enough between the GPU (f32) and the JS sampler (f64) — hash-of-large-sin diverges and floats the foam.
  const waveEnv = Fn(([p]) => {
    const s = sin(dot(p, vec2(0.0041, 0.0023)).add(uTime.mul(0.05)))
          .add(sin(dot(p, vec2(-0.0017, 0.0033)).sub(uTime.mul(0.04))).mul(0.7))
          .add(sin(dot(p, vec2(0.0026, -0.0039)).add(uTime.mul(0.035))).mul(0.55));
    const env = max(float(0.05), s.mul(uEnvAmt).mul(0.42).add(1.0));
    // SHOALING: shrink wave amplitude toward shallow water so a trough can't dip below the seabed and expose it
    // through the surface (the dark seabed patches seen on the turquoise shelf). depthN: 0 = coast/very shallow → 1 = deep.
    const _suv = vec2( p.x.sub(BATHY_RGN.x0).div(BATHY_RGN.x1-BATHY_RGN.x0), p.y.sub(BATHY_RGN.z0).div(BATHY_RGN.z1-BATHY_RGN.z0) );
    const _depthN = texture(bathyTex, clamp(_suv, vec2(0.0), vec2(1.0))).r;
    return env.mul(smoothstep(0.02, 0.18, _depthN)); });   // ~no waves in the shallowest band, full amplitude in deep water

  const waveH = Fn(([p]) => { const h = float(0).toVar();
    for (const w of WAVES) h.addAssign(sin(dot(p, vec2(w.nx, w.ny)).mul(w.freq).add(uTime.mul(w.speed))).mul(w.amp));
    return h.mul(uSea).mul(waveEnv(p)); });   // global amplitude × group envelope (vertical height for foam/normal sampling)
  // Gerstner/trochoidal displacement: each wave also pulls vertices horizontally toward its crest, so
  // crests sharpen into leaning peaks instead of smooth sine humps. Returns the full (x,y,z) offset.
  const gerstner = Fn(([p]) => { const d = vec3(0,0,0).toVar();
    for (const w of WAVES){ const ph = dot(p, vec2(w.nx, w.ny)).mul(w.freq).add(uTime.mul(w.speed));
      const c = cos(ph).mul(w.amp).mul(uChop);
      d.addAssign(vec3(c.mul(w.nx), sin(ph).mul(w.amp), c.mul(w.ny))); }
    return d.mul(uSea).mul(waveEnv(p)); });   // horizontal pinch + vertical, scaled by sea state × group envelope

  // FOLD: Jacobian determinant of the horizontal Gerstner map (x,z)→(x+Dx, z+Dz). det≈1 on flat water,
  // < 1 where the surface compresses toward a crest, and → 0 / negative where it OVERTURNS (breaks). Foam
  // and fingers belong exactly where this dips — i.e. where the wave is actually breaking, not merely tall.
  const waveFold = Fn(([p]) => {
    const jxx = float(0).toVar(), jxz = float(0).toVar(), jzz = float(0).toVar();
    for (const w of WAVES){
      const ph = dot(p, vec2(w.nx, w.ny)).mul(w.freq).add(uTime.mul(w.speed));
      const s = sin(ph).mul(w.amp * w.freq).mul(uChop);                 // ∂cos/∂· = −sin·k ; A·k·sin·chop
      jxx.addAssign(s.mul(-(w.nx*w.nx))); jxz.addAssign(s.mul(-(w.nx*w.ny))); jzz.addAssign(s.mul(-(w.ny*w.ny)));
    }
    const E = uSea.mul(waveEnv(p));
    const a = jxx.mul(E).add(1.0), b = jzz.mul(E).add(1.0), cc = jxz.mul(E);
    return a.mul(b).sub(cc.mul(cc)); });   // det(J)
  const waveN = Fn(([p]) => { const e = 0.9;
    const hL = waveH(p.add(vec2(-e,0))), hR = waveH(p.add(vec2(e,0)));
    const hD = waveH(p.add(vec2(0,-e))), hU = waveH(p.add(vec2(0,e)));
    return normalize(vec3(hL.sub(hR), 2*e, hD.sub(hU))); });
  // FIXED-width offshore shelf (world units), NOT proportional to island size — otherwise a big landmass
  // (mainland, Phuket) paints a giant shallow/foam halo that floods whole bays. Now every coast gets the
  // same ~shelf band, so open water and bay centres stay deep blue.
  // SHELF / shallows keyed to REAL seabed DEPTH (the bathymetry texture), NOT island-radius fringes — so deep
  // channels between close islands stay deep blue instead of their bands overlapping into one milky pale wash.
  const shore = Fn(() => {
    const uv = vec2( positionWorld.x.sub(BATHY_RGN.x0).div(BATHY_RGN.x1-BATHY_RGN.x0),
                     positionWorld.z.sub(BATHY_RGN.z0).div(BATHY_RGN.z1-BATHY_RGN.z0) );
    const depthN = texture(bathyTex, clamp(uv, vec2(0.0), vec2(1.0))).r;          // 0 = surface/coast → 1 = deep (~80u)
    const rad = oneMinus(smoothstep(float(BR0), float(BR1), vec2(positionWorld.x.sub(BCX), positionWorld.z.sub(BCZ)).length()));
    return clamp(smoothstep(0.45, 0.88, oneMinus(depthN)).mul(rad), 0.0, 1.0);    // genuinely shallow water → 1, deep → 0
  });
  // genuine hash value-noise (APERIODIC, not sines) — to break the regular sine interference
  const hash21 = Fn(([q]) => fract(sin(dot(q, vec2(127.1,311.7))).mul(43758.5453)));
  const vnoise = Fn(([p]) => { const i = floor(p), f = fract(p);
    const u = f.mul(f).mul(f.mul(-2.0).add(3.0));
    const a=hash21(i), b=hash21(i.add(vec2(1.0,0.0))), c=hash21(i.add(vec2(0.0,1.0))), d=hash21(i.add(vec2(1.0,1.0)));
    return mix(mix(a,b,u.x), mix(c,d,u.x), u.y); });
  const fbm2 = Fn(([p]) => vnoise(p).mul(0.5)
    .add(vnoise(p.mul(2.03).add(vec2(5.2,1.3))).mul(0.25))
    .add(vnoise(p.mul(4.07).add(vec2(2.7,9.1))).mul(0.15))
    .add(vnoise(p.mul(8.11).add(vec2(8.3,2.8))).mul(0.1)));

  const xz = positionLocal.xz;
  const n = waveN(xz), sp = shore(), wh = waveH(xz);
  const viewDir = normalize(cameraPosition.sub(positionWorld));
  const sunDir = normalize(uSunDir);

  // ALL the colour mutations (.toVar/.assign/.addAssign) MUST live inside a Fn(), or TSL throws
  // "No stack defined for assign" and silently DROPS every assignment — leaving only the base depth
  // gradient. That single bug is why the sea was a flat gradient and the sun glint / sparkle / foam /
  // dapple never rendered. Wrapping the graph in a Fn gives the assignments their stack.
  const oceanColor = Fn(() => {
    const deep = vec3(0.012,0.09,0.22), midC = vec3(0.035,0.23,0.41), shallow = vec3(0.09,0.45,0.53);   // deeper, more saturated shelf — not a milky pale turquoise
    const col = mix(deep, midC, smoothstep(0.0,0.5,sp)).toVar();
    col.assign(mix(col, shallow, smoothstep(0.55,1.0,sp)));
    col.assign(col.mul(uSeaTint));                          // per-region water tint

    // aperiodic patchiness — organic light/dark FBM at two scales (against-the-grain, never tiles)
    const drift = vec2(time.mul(0.5), time.mul(-0.35));
    const patch  = fbm2(xz.mul(0.018).add(drift.mul(0.02)));
    const patch2 = fbm2(xz.mul(0.075).add(drift.mul(0.05)));

    // #A7C7E7 shadow) is added separately below. Bias toward deep blue so the bulk of the sea reads dark and carved.
    // Hokusai's signature progression: dark INDIGO troughs → vivid COBALT body → pale blue ONLY at the crest tips.
    // Bias the mapping dark (input range shifted high) so ordinary/flat water sits in the deep indigo-cobalt range —
    // the print is overwhelmingly deep blue, with pale tones reserved for the curling crest edges and foam.

    hk.assign(mix(hk, vec3(0.655,0.780,0.906), smoothstep(0.88,1.0,hkT)));          // → pale sky-blue #A7C7E7 only at the crest tips
    col.assign(mix(col, hk, uHokusai));

    //      ultramarine with cream-yellow ridge highlights, advected along a swirl field so the sea reads as paint. ----
    const q = xz.mul(0.05).add(vec2(time.mul(0.06), time.mul(-0.04)));
    const w = vec2(fbm2(q).sub(0.5), fbm2(q.add(vec2(4.7,2.3))).sub(0.5)).mul(3.6);   // domain warp → the iconic swirls/eddies
    const qs = q.add(w);
    const strokes = fbm2(vec2(qs.x.mul(9.0), qs.y.mul(1.6)));                 // anisotropic → stretched brush streaks curving with the swirl
    const flow = fbm2(qs.mul(0.7));                                          // big tonal masses
    const ridge = smoothstep(0.15, 0.0, abs(strokes.sub(0.5)));              // bright impasto ridge at each brush edge
    const vgDeep=vec3(0.043,0.094,0.345), vgMid=vec3(0.094,0.255,0.620), vgLite=vec3(0.36,0.55,0.88), vgCream=vec3(0.97,0.86,0.40);

    vg.assign(mix(vg, vgLite, smoothstep(0.62,0.86,strokes)));
    vg.assign(mix(vg, vgCream, ridge.mul(0.55).add(smoothstep(0.90,1.0,strokes).mul(0.5))));   // cream ridges + crest sparkle
    vg.assign(vg.mul(float(0.74).add(flow.mul(0.5))).add(vgLite.mul(smoothstep(0.2,1.6,wh).mul(0.30))));
    // Van Gogh NIGHT sea mode: 1 = mirror the swirling Starry-Night sky (default), suppressing the impasto surface.
    const vgNightSea = uVangogh.mul(uVgReflect).mul(smoothstep(0.12, -0.10, uSunDir.y.sub(uHorizonDrop)));
    col.assign(mix(col, vg, uVangogh.mul(0.9).mul(oneMinus(vgNightSea))));   // impasto stays by day / when reflect-mode off; off for the night mirror

    // ---- FRONT-vs-BACK split (the Great Wave's key move) — the normal's horizontal lean tells which face we're on:
    // pointing WITH wave travel = the front/underbelly (breaking face) → force the two dark Prussian blues & no foam;
    // pointing AGAINST travel = the rising back → keep the pale crest + foam. n.xz·waveDir > 0 ⇒ front.
    const faceDot  = n.x.mul(uWaveDir.x).add(n.z.mul(uWaveDir.y));
    const frontRaw = smoothstep(0.03, 0.20, faceDot);                               // 1 on the steep front face
    col.assign(mix(col, vec3(0.055,0.140,0.300), frontRaw.mul(uHokusai).mul(0.85)));// front underbelly → deep indigo/cobalt

    // big low-frequency dark mottle (applied as a MULTIPLY at the end so it survives bright sun)

    // ---- subsurface scattering: sunlight transmitted THROUGH backlit crests → teal-green glow (wrap + thickness) ----
    // strongest when looking toward the sun (waves lit from behind) and on the tallest crests (most "thickness").
    // backlit = looking TOWARD the sun (so light comes through the wave from behind): dot(viewDir, -sunDir).
    // Strongest at low sun (grazing → more thickness traversed) and on the tallest crests.

    // ---- PBR reflection: Schlick fresnel (water F0≈0.02) × the ACTUAL sky in the reflected direction ----
    // We mirror the sky shader (horizon→zenith gradient + sun disk/glow) sampled along the reflected view ray, so the
    // water reflects the real sky and a moving sun-glitter path — and the fresnel is ~2% head-on (deep, non-plastic)

    const whitecap = clamp(wcBase.mul(oneMinus(uHokusai)), 0.0, 1.0);   // non-Hokusai whitecap; Hokusai foam is the froth block below
    // shoreline foam — a THIN broken ring hugging each island's actual coastline (the shallowest strip only), so the
    // open/deeper water between island clusters stays blue instead of one big milky shallow wash. `sp` follows the real
    // bathymetry, so keying foam to just the highest sp (≈ right at the coast) traces each island's true outline.
    const cuvF = vec2( positionWorld.x.sub(BATHY_RGN.x0).div(BATHY_RGN.x1-BATHY_RGN.x0),
                       positionWorld.z.sub(BATHY_RGN.z0).div(BATHY_RGN.z1-BATHY_RGN.z0) );
    const coastN = texture(bathyTex, clamp(cuvF, vec2(0.0), vec2(1.0))).g;      // DISTANCE to the nearest coast (not depth): 0 at the shore → 1 far out
    const lap = sin(coastN.mul(55.0).sub(time.mul(2.3))).mul(0.5).add(0.5);     // foam laps in/out along the distance gradient

    const froth = fbm2(xz.mul(0.40).add(fwarp).add(drift.mul(0.7)));                  // warped lacy field (the red debug proved it's rich)
    // The froth FIELD was always fine — every failure was COLOUR: dark ink on dark water, or white on white crests.
    // Fix: a WHITE claw CORE with a slightly WIDER DARK-INDIGO RIM (the wider dark mask shows as a keyline around the
    // white), gated by WAVE HEIGHT — n.y slope barely fires on these flat swells, but height does. White-on-blue reads.
    // FOLD-driven foam: foam blooms where the Gerstner surface is overturning (det dips), not merely where it's tall —
    // so the froth appears precisely on the breaking crests. Blended with a height floor so calm crests still get a little.

    const frothBand = smoothstep(-0.15, 1.05, wh).mul(uHokusai).mul(oneMinus(frontRaw.mul(0.92)))

    const inkMask   = clamp(smoothstep(0.40, 0.47, froth).mul(frothBand), 0.0, 1.0);  // wider  → dark keyline rim
    const whiteMask = clamp(smoothstep(0.50, 0.57, froth).mul(frothBand), 0.0, 1.0);  // narrower → white claw core
    col.assign(mix(col, vec3(0.043,0.110,0.255), inkMask.mul(0.92)));                 // 1) dark indigo keyline first
    col.assign(mix(col, foamCol, whiteMask));                                         // 2) white claw on top → ink rim remains

    // FINAL multiplicative wave shade + low-freq mottle — darkens troughs on the FINISHED colour so the
    // dapple reads in full sun, not just inside cloud shadows. whN = wave height in base units.
    const whN = wh.div(uSea.max(0.001));
    col.assign(col.mul(mix(float(0.74), float(1.10), smoothstep(-1.0, 0.9, whN)).mul(oneMinus(mottle.mul(0.10)))));

    // ---- bathymetry overlay (toggle): REAL GEBCO seabed depth ramp + iso-depth contour lines ----
    const bUv = vec2( positionWorld.x.sub(BATHY_RGN.x0).div(BATHY_RGN.x1-BATHY_RGN.x0),
                      positionWorld.z.sub(BATHY_RGN.z0).div(BATHY_RGN.z1-BATHY_RGN.z0) );
    const depthN = texture(bathyTex, bUv).r;                                   // 0 surface → 1 deep(~60u compressed)
    const depthCol = mix(vec3(0.34,0.82,0.90), vec3(0.04,0.16,0.40), clamp(depthN, 0.0, 1.0));   // shallow turquoise → deep blue
    const cband = depthN.mul(13.0);                                            // iso-depth contour bands
    const cline = oneMinus(smoothstep(0.0, 0.16, abs(sin(cband.mul(3.14159265)))));

  });

  oceanMat = new THREE.MeshBasicNodeMaterial();
  oceanMat.positionNode = curveNode(positionLocal.add(gerstner(positionLocal.xz)));   // Gerstner (peaked, leaning crests) + tiny-planet curvature
  // ISLAND SHADOWS ON THE SEA: the water shader is unlit, so darken the final colour where the sun is occluded,
  // sampled at the fragment's real (curved, Gerstner) world position → the shadow follows the contoured surface

  // from the caster. Approximate that with the bathy DISTANCE-TO-COAST field (g: 0 at shore → 1 far out): full shadow
  // hugging the islands, fading to nothing as the long low-sun streaks reach into open water — so they taper, not run
  // solid to their tip.
  {
    const _shUV = vec2( positionWorld.x.sub(BATHY_RGN.x0).div(BATHY_RGN.x1-BATHY_RGN.x0),
                        positionWorld.z.sub(BATHY_RGN.z0).div(BATHY_RGN.z1-BATHY_RGN.z0) );
    const _coastN = texture(bathyTex, clamp(_shUV, vec2(0.0), vec2(1.0))).g;   // distance to nearest coast (0 shore → 1 far)

  }

  // hiding the sea-skirt and the terrain field's edge wall that the user saw as a dark bar
  oceanMat.opacityNode = Fn(() => {
    const _dx = positionWorld.x.sub(BCX), _dz = positionWorld.z.sub(BCZ);
    const m = oneMinus(smoothstep(float(BR0), float(BR1), vec2(_dx,_dz).length()));   // translucent inside the soft circle

  scene.add(new THREE.Mesh(geo, oceanMat));
}

  // GTAO post-process (which couldn't reproduce our custom-shader scene and read black by day).

  const mat = new THREE.MeshLambertNodeMaterial({});

  mat.positionNode = curveNode(positionLocal);        // tiny-planet curvature — islands bend with the sea
  const mesh = new THREE.Mesh(geo, mat); mesh.position.y = -0.05;

  // seabed-rectangle (the reason receive used to be off) no longer crosses the visible sea floor.
  mesh.castShadow = true; mesh.receiveShadow = true; scene.add(mesh); terrainMesh = mesh;
}

function buildBoat() {

  const trimMat = new THREE.MeshStandardMaterial({ color:0x7a2e1e, roughness:0.7 });   // painted wale stripe

  const sailMat = new THREE.MeshStandardMaterial({ color:0xeae0c8, roughness:0.95, side:THREE.DoubleSide });

    let x=hp.getX(i), y=hp.getY(i), z=hp.getZ(i); const xn=x/6.5;

  const railTrim = new THREE.Mesh(new THREE.BoxGeometry(10.5, 0.16, 4.85), goldMat); railTrim.position.set(0.2,2.35,0); g.add(railTrim);

      p.setX(i, Math.cos((z/w)*Math.PI)*bulge*(1-Math.abs(yy/h)*0.35)); }

    c.rotation.x=Math.PI/2; c.position.set(x,y,0); g.add(c); }

    for(const [w,h,yy] of sails){ const s=sail(w,h,0.9); s.position.set(x+0.05,yy,0); g.add(s); yard(w,yy+h/2,x); }

  const foreTop = mast(4.0, 12.0, [[5.4,3.6,5.6],[4.0,2.8,10.0]]);
  const mizzTop = mast(-4.4, 10.0, [[4.2,3.2,5.2]]);

  const nest=new THREE.Mesh(new THREE.CylinderGeometry(0.7,0.55,0.8,10,1,true), sparMat); nest.position.set(0.2, mainTop-3.4,0); g.add(nest);

// orient the hull: local +X = heading, +Y = wave normal (so it conforms to the swell),
// then bank gently into turns. (The old Euler version pointed the hull 90° off-course.)
const _mB = new THREE.Matrix4(), _vX = new THREE.Vector3(), _vY = new THREE.Vector3(), _vZ = new THREE.Vector3();
function placeBoat(boat, s, t) {
  const y = waveHeightJS(s.x, s.z, t) - curveDropJS(s.x, s.z);   // sink onto the curved (tiny-planet) sea like every other floating prop, else the boat floats as the camera pulls back
  boat.position.set(s.x, y, s.z);
  const e = 3.0;
  const hx = (waveHeightJS(s.x+e, s.z, t) - waveHeightJS(s.x-e, s.z, t)) / (2*e);
  const hz = (waveHeightJS(s.x, s.z+e, t) - waveHeightJS(s.x, s.z-e, t)) / (2*e);
  _vY.set(-hx, 1, -hz).normalize();                          // up = wave normal

  _vX.addScaledVector(_vY, -_vX.dot(_vY)).normalize();       // make it perpendicular to up
  _vZ.crossVectors(_vX, _vY).normalize();

// blending Ansel-Adams wide grandeur ↔ Cartier-Bresson decisive-moment tightness

    if (blob.size < 1024){ if(ui.recBtn) ui.recBtn.textContent='Empty — no frames'; recState='idle'; updateRecUI(); return; }   // don't download a broken/empty clip
    const url = URL.createObjectURL(blob), a = document.createElement('a');
    a.href = url; a.download = 'caribbean-helmsman-' + Date.now() + '.' + ext;
    document.body.appendChild(a); a.click();
    setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 1500);
    recState = 'idle'; updateRecUI();
  };
  mediaRecorder.start(); recState = 'recording'; transT = 0; updateRecUI();
}
function stopRecording(){ if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop(); }
function pauseSegment(){
  if (recState !== 'recording') return;
  if (transType === 'dissolve'){
    frame1Canvas = frame1Canvas || document.createElement('canvas');
    frame1Canvas.width = recCanvas.width; frame1Canvas.height = recCanvas.height;
    frame1Canvas.getContext('2d').drawImage(renderer.domElement, 0,0, frame1Canvas.width, frame1Canvas.height);
    if (mediaRecorder.state === 'recording') mediaRecorder.pause();
    recState = 'paused';
  } else { recState = 'transOut'; transT = 0; }   // fade out (recorded), then auto-pause
  updateRecUI();
}
function resumeSegment(){
  if (recState !== 'paused') return;
  if (mediaRecorder.state === 'paused') mediaRecorder.resume();
  if (transType === 'dissolve'){ recState = 'dissolve'; transT = 0; }
  else { recState = 'transIn'; transT = 0; }
  updateRecUI();
}
// ease 0..1 -> 0..1, blending linear→smoothstep by P.transEase
function easeAmt(t){ t = clampJS(t,0,1); const s = t*t*(3-2*t); return lerp(t, s, clampJS(P.transEase,0,1)); }
function drawRecEffect(src, W, H, amt){   // amt 0 = full colour, 1 = full effect
  recCtx.filter = 'none'; recCtx.globalAlpha = 1;
  if (transType === 'grayscale'){ recCtx.filter = `grayscale(${(amt*100)|0}%)`; recCtx.drawImage(src,0,0,W,H); recCtx.filter='none'; }
  else { recCtx.drawImage(src,0,0,W,H); recCtx.globalAlpha = amt; recCtx.fillStyle = '#000'; recCtx.fillRect(0,0,W,H); recCtx.globalAlpha = 1; }
}
function compositeRecording(dt){
  if (recState === 'idle' || !recCtx) return;
  const src = renderer.domElement, W = recCanvas.width, H = recCanvas.height;
  const FO = Math.max(0.02, P.transFadeOut), FI = Math.max(0.02, P.transFadeIn), HD = Math.max(0, P.transHold);
  if (recState === 'recording'){ recCtx.filter='none'; recCtx.globalAlpha=1; recCtx.drawImage(src,0,0,W,H); }
  else if (recState === 'transOut'){            // fade color → full effect over FO, then hold at full for HD, then auto-pause
    transT += dt;
    const amt = transT < FO ? easeAmt(transT/FO) : 1;
    drawRecEffect(src,W,H,amt);
    if (transT >= FO+HD){ if (mediaRecorder.state==='recording') mediaRecorder.pause(); recState='paused'; updateRecUI(); } }
  else if (recState === 'paused'){ drawRecEffect(src,W,H,1); }   // not recorded; just keeps the canvas valid
  else if (recState === 'transIn'){             // fade full effect → color over FI
    transT += dt;
    const amt = easeAmt(1 - transT/FI);
    drawRecEffect(src,W,H,Math.max(0,amt));
    if (transT >= FI){ recState='recording'; updateRecUI(); } }
  else if (recState === 'dissolve'){            // crossfade segment-1 frame → live over FO+FI, eased
    transT += dt; const k = easeAmt(transT/(FO+FI));
    recCtx.filter='none'; recCtx.clearRect(0,0,W,H);
    recCtx.globalAlpha = 1 - k; if (frame1Canvas) recCtx.drawImage(frame1Canvas,0,0,W,H);
    recCtx.globalAlpha = k; recCtx.drawImage(src,0,0,W,H); recCtx.globalAlpha = 1;
    if (transT >= FO+FI){ recState='recording'; updateRecUI(); } }
  // push exactly one captured frame per rendered frame for every recorded state
  // (skip 'paused' — the recorder is paused, so we don't want frames going to the file)
  if (recState !== 'paused' && recTrack && recTrack.requestFrame) recTrack.requestFrame();
}
function updateRecUI(){
  if (!ui.recBtn) return;
  const rec = recState !== 'idle';
  ui.recBtn.textContent = rec ? '■ Stop & save' : '● Record';
  ui.recBtn.classList.toggle('active', rec);
  ui.segBtn.style.display = rec ? '' : 'none';
  ui.segBtn.textContent = (recState === 'paused') ? '▶ Resume seg' : '❚❚ Pause seg';
  ui.segBtn.classList.toggle('active', recState !== 'recording' && rec);
}

// Ambient occlusion is now BAKED at build time — into terrain vertex colours (buildTerrain) and
// per-puff cloud shading (buildClouds) — so it's always on, free, and can't black out the frame.
// The old GTAO post-process couldn't reproduce our custom-shader scene and was removed.

// Bloom (HDR-ish glow) — guarded, OFF by default, lazy dynamic-import so a failure can't break boot.
// Makes bright spots (sun sparkle on wave caps, fireworks, sun glint) bleed a soft halo.
let bloomPost = null, bloomActive = false;
async function enableBloom(){
  if (bloomPost){ bloomActive = true; return; }
  try {
    const mod = await import('three/addons/tsl/display/BloomNode.js');
    const scenePass = pass(scene, camera);
    const col = scenePass.getTextureNode();
    const bloomPass = mod.bloom(col, 0.55, 0.45, 0.85);   // strength, radius, threshold (only the brightest bloom)
    const pp = new THREE.PostProcessing(renderer);
    pp.outputNode = col.add(bloomPass);
    bloomPost = pp; bloomActive = true; console.log('bloom enabled');
  } catch(e){ console.warn('bloom setup failed — reverting', e); bloomActive=false; bloomPost=null;
    P.bloom=false; if (ui.bloomTog) ui.bloomTog.classList.remove('on'); }
}
function disableBloom(){ bloomActive = false; }

// ============================================================================
// Rain on the lens — guarded WebGPU TSL post-process. Procedural rain-on-glass: head-drops slide down
// lanes (with trails) + a sprinkle of static beads; their height field refracts the scene beneath.
// Intensity rides the storm (uRain). OFF unless toggled AND storming. (Now safe — the Fn() stack bug
// that broke earlier post-processes is fixed.)
// ============================================================================
let rainPost = null, rainActive = false, rainScenePass = null;
const uRain = uniform(0.0);
async function enableRain(){
  if (rainPost){ rainActive = true; return; }
  try {
    rainScenePass = pass(scene, camera);
    const col = rainScenePass.getTextureNode();
    const hash21 = Fn(([p]) => fract(sin(dot(p, vec2(127.1,311.7))).mul(43758.5453)));
    const hash22 = Fn(([p]) => fract(sin(vec2(dot(p, vec2(127.1,311.7)), dot(p, vec2(269.5,183.3)))).mul(43758.5453)));
    // one grid of static drops that fade in and evaporate; density gated by storm strength
    const dropLayer = Fn(([uvp, cells, seed]) => {
      const g = uvp.mul(cells).add(seed), id = floor(g), f = fract(g).sub(0.5);
      const rnd = hash22(id.add(seed));
      const c = f.sub(rnd.sub(0.5).mul(0.78));                                    // jittered position in cell
      const phase = fract(rnd.x.add(time.mul(rnd.y.mul(0.06).add(0.03))));        // each drop on its own clock
      const evap = smoothstep(0.0, 0.14, phase).mul(smoothstep(0.92, 0.5, phase));// fade in → hold → evaporate
      const present = clamp(uRain.mul(1.25).sub(rnd.x).mul(7.0), 0.0, 1.0);       // fewer drops at low storm
      const rad = rnd.y.mul(0.16).add(0.05);
      return smoothstep(rad, 0.0, length(c)).mul(evap).mul(present);
    });
    const film = Fn(([uvp]) => {                     // 3 UNALIGNED grids → irregular sprinkle, no streaks
      const h = float(0.0).toVar();
      h.addAssign(dropLayer(uvp, vec2(13.0,13.0), vec2(0.0,0.0)));
      h.addAssign(dropLayer(uvp, vec2(19.0,17.0), vec2(3.7,1.2)));
      h.addAssign(dropLayer(uvp, vec2(28.0,26.0), vec2(8.3,5.9)).mul(0.7));
      return h;
    });
    const asp = screenSize.x.div(screenSize.y);
    const uvA = vec2(screenUV.x.mul(asp), screenUV.y);
    const e = float(0.0018);
    const hC = film(uvA), hX = film(uvA.add(vec2(e,0.0))), hY = film(uvA.add(vec2(0.0,e)));
    const grad = vec2(hC.sub(hX), hC.sub(hY)).mul(uRain);
    const refr = col.sample(screenUV.add(grad.mul(0.55)));                                    // gentler refraction
    const rim = pow(clamp(hC,0.0,1.0), 2.0).mul(0.22).mul(uRain);                             // subtle glint
    const pp = new THREE.PostProcessing(renderer);
    pp.outputNode = refr.add(vec3(rim));
    rainPost = pp; rainActive = true; console.log('rain enabled');
  } catch(e){ console.warn('rain setup failed — reverting', e); rainActive=false; rainPost=null;
    P.rainLens=false; if (ui.rainTog) ui.rainTog.classList.remove('on'); }
}
function disableRain(){ rainActive = false; }

// ============================================================================
// Woodblock ink outlines — a luminance-Sobel edge-detection post-pass (same PostProcessing mechanics as
// the rain pass). Draws dark ink contours where the image gradient is steep (island/foam/ship edges).
// Only rendered for woodblock styles (sumi-e, Hokusai); strength rides uOutline.
// ============================================================================
let outlinePost = null, outlineActive = false, outlineScenePass = null;
const uOutline = uniform(0.0);
async function enableOutline(){
  if (outlinePost){ outlineActive = true; return; }
  try {
    outlineScenePass = pass(scene, camera);
    const col = outlineScenePass.getTextureNode();
    const ts = vec2(1.0,1.0).div(screenSize);                                   // one-texel offsets
    const L = (ox,oy)=> dot(col.sample(screenUV.add(vec2(ts.x.mul(ox), ts.y.mul(oy)))).xyz, vec3(0.299,0.587,0.114));
    const tl=L(-1,-1), tc=L(0,-1), tr=L(1,-1), ml=L(-1,0), mr=L(1,0), bl=L(-1,1), bc=L(0,1), br=L(1,1);
    const gx = tr.add(mr.mul(2.0)).add(br).sub(tl).sub(ml.mul(2.0)).sub(bl);    // Sobel X
    const gy = bl.add(bc.mul(2.0)).add(br).sub(tl).sub(tc.mul(2.0)).sub(tr);    // Sobel Y
    const edge = length(vec2(gx, gy));
    const lineAmt = smoothstep(0.22, 0.58, edge).mul(uOutline);                 // ink line strength (higher floor = cleaner lines, less wave noise)
    const pp = new THREE.PostProcessing(renderer);
    pp.outputNode = mix(col, vec3(0.04,0.035,0.03), lineAmt);                   // dark sumi ink, not pure black
    outlinePost = pp; outlineActive = true; console.log('outline enabled');
  } catch(e){ console.warn('outline setup failed', e); outlineActive=false; outlinePost=null; }
}

// ---- GOD RAYS (screen-space crepuscular shafts) ----
// March each pixel toward the sun's screen position, accumulating only the BRIGHT parts of the scene (sky + sun).
// Islands / boat / clouds are dark in the bright-pass, so they block the march → shafts radiate from the sun and are
// carved by silhouettes. Tinted by the sun colour, scaled by the Atmosphere slider. Most dramatic at low sun (sun
// near the horizon sits behind the island silhouettes). 40 radial taps — "max fidelity".
let godrayPost = null, godrayActive = false, godrayScenePass = null;
async function enableGodrays(){
  if (godrayPost){ godrayActive = true; return; }
  try {
    godrayScenePass = pass(scene, camera);
    const col = godrayScenePass.getTextureNode();
    const N = NOOPT ? 52 : 30;                            // OPT #2: 30 radial taps (was 52), ~40% cheaper; ?noopt restores 52 for A/B. Decay retuned below so the shaft look is preserved.
    const step = uSunScreenUV.sub(screenUV).mul(0.92/N);  // march ~92% of the way to the sun
    const illum = float(0).toVar();
    const coord = screenUV.toVar();
    let w = 1.0;
    for (let i=0;i<N;i++){
      coord.addAssign(step);
      const s = col.sample(clamp(coord, vec2(0.0,0.0), vec2(1.0,1.0))).xyz;
      illum.addAssign(max(dot(s, vec3(0.299,0.587,0.114)).sub(0.40), 0.0).mul(w));   // bright-pass (sky/sun/lit cloud) × decay
      w *= (NOOPT ? 0.967 : 0.943);                       // OPT #2: decay retuned for N=30 (0.943) so cumulative reach ≈ old 52-tap 0.967 profile; ?noopt restores 0.967
    }
    illum.assign(illum.mul(4.4/N));                       // exposure
    const rays = uSunCol.mul(illum).mul(uAtmo).mul(uSunOnScreen);
    const lit = col.add(rays).toVar();                    // scene + shafts
    // sunset BLOOM: proper HDR mip-bloom of the bright sun / glitter / foam (+ the rays), scaled by Atmosphere → glow
    const bmod = await import('three/addons/tsl/display/BloomNode.js');
    const bloomPass = bmod.bloom(lit, 0.95, 0.6, 0.7);    // strength, radius, threshold (0.7 so matte labels at 0.64 luma don't bloom)
    const graded = lit.add(bloomPass.mul(uAtmo)).toVar();
    // ---- GOLDEN-HOUR GRADE: cinematic warm split-tone + gentle contrast + vignette, ramping with sunset (uWarm) × Atmosphere.
    const gAmt = clamp(uWarm.mul(uAtmo).mul(1.2), 0.0, 1.0);
    const gl = dot(graded, vec3(0.299,0.587,0.114));
    const tone = mix(vec3(0.93,0.97,1.08), vec3(1.12,1.0,0.82), smoothstep(0.16,0.82,gl));   // cool shadows → warm-gold highlights
    graded.assign(mix(graded, graded.mul(tone), gAmt));
    graded.assign(mix(graded, smoothstep(0.0,1.0,graded), gAmt.mul(0.22)));                  // gentle S-curve contrast
    const _vd = screenUV.sub(vec2(0.5,0.5));                                                  // cinematic vignette
    const vig = oneMinus(clamp(dot(_vd,_vd).mul(1.15), 0.0, 1.0));
    graded.assign(graded.mul(mix(float(1.0), vig, gAmt.mul(0.5))));
    const pp = new THREE.PostProcessing(renderer);
    pp.outputNode = graded;
    godrayPost = pp; godrayActive = true; console.log('atmosphere pass: godrays+bloom+grade enabled');
  } catch(e){ console.warn('godray setup failed', e); godrayActive=false; godrayPost=null; }
}

function saveSettings(){ try { localStorage.setItem(SETTINGS_KEY, JSON.stringify(P)); } catch(_){ } }

  if (s){ Object.assign(P, JSON.parse(s)); P.paused = false; P.cine = true; P.bloom = false; } } catch(_){ } }   // Director camera is the default view; don't auto-restore pause / bloom

// Snapshot every control value + the active route into one portable, shareable object.

function collectSettings(){
  const settings = JSON.parse(JSON.stringify(P));
  settings.paused = false; settings.cine = false; settings.bloom = false;

           route: (typeof currentRouteNames==='function' ? currentRouteNames() : undefined),
           settings };
}

// ============================================================================
// PERFORMANCE SWEEP HARNESS — run every demo scenario for a fixed window, capture
// CPU frame-time (ms), realized frame interval, and (best-effort) GPU frame-time via
// WebGPU timestamp queries. Stats + percentiles + 1%-lows per scenario, saved to
// localStorage (ring buffer of the last 10 runs) and diffable run-to-run.
//   Trigger:  dev.perfSweep({label:'optimized'})  ·  Misc-panel button  ·  ?perf=label
//   Review:   dev.perfRuns()  ·  dev.perfDump()  ·  dev.perfDiff('baseline','optimized')
// (CPU/GPU ms matter more than FPS for tuning: realized FPS is vsync-capped and hides
//  headroom above the refresh rate, where most of these scenarios run.)
// ============================================================================
let _perfRecording=false, _perfBuf=[], _perfPrevTop=0, _perfState=null, _lastGpuMs=0;
const PERF_KEY='islandHopper.perf.v1';
function _perfSleep(ms){ return new Promise(r=>setTimeout(r,ms)); }
async function _perfWaitSettle(extraMs){   // wait out the dive/compile jank before sampling
  const t0=performance.now();
  while ((typeof _demoBusy!=='undefined' && _demoBusy) || (typeof _swapping!=='undefined' && _swapping)){
    if (performance.now()-t0>15000) break;   // safety cap

}
function _pctl(sorted, p){ if(!sorted.length) return 0; const i=Math.min(sorted.length-1, Math.max(0, Math.round((p/100)*(sorted.length-1)))); return sorted[i]; }
function _statOf(arr){ if(!arr.length) return null; const s=arr.slice().sort((a,b)=>a-b); const mean=arr.reduce((x,y)=>x+y,0)/arr.length;
  return { mean:+mean.toFixed(3), p50:+_pctl(s,50).toFixed(3), p95:+_pctl(s,95).toFixed(3), p99:+_pctl(s,99).toFixed(3), max:+s[s.length-1].toFixed(3) }; }
function _perfStats(sc, buf){

  if (!b.length) return { name:sc.name, region:sc.region, frames:0, fps:{mean:0,p1_low:0,min:0}, cpuMs:null, gpuMs:null, intervalMs:null };
  const cpu=b.map(r=>r.cpu), intv=b.map(r=>r.intv), gpu=b.map(r=>r.gpu).filter(v=>v>0);

  return {
    name: sc.name, region: sc.region, present: sc.present,
    context: { style:(sc.settings&&sc.settings.style), fleet:sc.fleet, autoDay:(sc.settings&&sc.settings.autoDay), atmosphere:(sc.settings&&sc.settings.atmosphere), timeOfDay:(sc.settings&&sc.settings.timeOfDay) },
    frames: b.length,
    fps: { mean:+(fpsArr.reduce((x,y)=>x+y,0)/fpsArr.length).toFixed(1), p1_low:+(1000/low1).toFixed(1), min:+(1000/sIntv[0]).toFixed(1) },

function _perfLoadRuns(){ try{ const s=localStorage.getItem(PERF_KEY); if(s) return JSON.parse(s); }catch(_){} return []; }

  const gpuMeans=scenarios.map(s=>s.gpuMs?s.gpuMs.mean:0).filter(v=>v>0);
  const fpsMeans=scenarios.map(s=>s.fps.mean);
  let worst=null; scenarios.forEach(s=>{ const m=s.cpuMs?s.cpuMs.mean:0; if(!worst||m>worst.cpuMs) worst={name:s.name, cpuMs:m}; });
  return {
    schema: PERF_KEY, label: cfg.label, timestamp: new Date().toISOString(),
    env: { ua: navigator.userAgent, canvasW: c.width, canvasH: c.height, cssW: c.clientWidth, cssH: c.clientHeight,

    config: cfg, scenarios,

async function runPerfSweep(opts){

  const cfg={ settleMs: opts.settleMs!=null?opts.settleMs:2000, sampleMs: opts.sampleMs!=null?opts.sampleMs:8000,
              label: opts.label || (NOOPT?'baseline':'optimized'), noopt: NOOPT, forceW: opts.forceW||0, forceH: opts.forceH||0,
              forceSnap: !!opts.forceSnap,       // present each scenario via direct snap (skip globe dives — robust for automated/background runs; steady-state perf is identical)
              ignoreHidden: !!opts.ignoreHidden }; // don't abort if the tab is backgrounded (CPU/GPU ms stay valid when throttled; only fps inflates)
  const list=demoScenarios, wasDemo=demoMode, musicWas=P.music;
  try{ P.music=false; stopIntroMusic(); }catch(_){}
  if (!demoMode){ enterDemoMode(); await _perfSleep(800); }
  let _restore=null;
  if (cfg.forceW && cfg.forceH){ const c=renderer.domElement; _restore=[c.clientWidth||window.innerWidth, c.clientHeight||window.innerHeight]; try{ renderer.setSize(cfg.forceW,cfg.forceH,false); }catch(_){} }

    else { try{ demoGo(i); }catch(e){ console.warn('[perf] demoGo', e); } }
    await _perfWaitSettle(cfg.settleMs);
    if (document.hidden){ _perfState.backgrounded=true;
      if (!cfg.ignoreHidden){ _perfState.aborted='tab hidden — keep the tab focused (RAF throttles in the background)'; console.warn('[perf] ABORTED:', _perfState.aborted); break; } }
    _perfBuf=[]; _perfPrevTop=0; _lastGpuMs=0; _perfRecording=true;

}
function perfDiff(labelA, labelB){   // compare the latest run of each label (negative delta = labelB faster)
  const runs=_perfLoadRuns();
  const find=l=>{ for(let i=runs.length-1;i>=0;i--) if(runs[i].label===l) return runs[i]; return null; };
  const A=find(labelA), B=find(labelB);
  if(!A||!B){ console.warn('[perf] need runs labeled "'+labelA+'" & "'+labelB+'" — stored labels:', runs.map(r=>r.label)); return; }
  const rows=[];
  A.scenarios.forEach(sa=>{ const sb=B.scenarios.find(s=>s.name===sa.name); if(!sb||!sa.cpuMs||!sb.cpuMs) return;
    const row={ scenario:sa.name };
    row[labelA+'_cpu']=sa.cpuMs.mean; row[labelB+'_cpu']=sb.cpuMs.mean;
    row.cpu_delta=+(sb.cpuMs.mean-sa.cpuMs.mean).toFixed(2); row.cpu_pct=+(100*(sb.cpuMs.mean-sa.cpuMs.mean)/sa.cpuMs.mean).toFixed(1);
    if(sa.gpuMs&&sb.gpuMs){ row.gpu_delta=+(sb.gpuMs.mean-sa.gpuMs.mean).toFixed(2); row.gpu_pct=+(100*(sb.gpuMs.mean-sa.gpuMs.mean)/sa.gpuMs.mean).toFixed(1); }
    row[labelA+'_fps']=sa.fps.mean; row[labelB+'_fps']=sb.fps.mean;
    rows.push(row);
  });
  console.log('[perf] DIFF '+labelA+' → '+labelB+'  (negative delta = '+labelB+' faster)');
  try{ console.table(rows); }catch(_){ console.log(rows); }
  console.log('[perf] aggregate cpuMs '+A.aggregate.cpuMs_mean+' → '+B.aggregate.cpuMs_mean+'   gpuMs '+A.aggregate.gpuMs_mean+' → '+B.aggregate.gpuMs_mean+'   fps '+A.aggregate.fps_mean+' → '+B.aggregate.fps_mean);
  return rows;
}

  h.addEventListener('click', ()=>{ s.classList.toggle('collapsed'); savePanelLayout(); });   // click header → collapse/expand
  h.addEventListener('dragstart', e=>{ _dragSec=s; s.classList.add('dragging'); e.dataTransfer.effectAllowed='move'; try{ e.dataTransfer.setData('text/plain', title); }catch(_){} });
  h.addEventListener('dragend', ()=>{ s.classList.remove('dragging'); _dragSec=null; savePanelLayout(); });

function applyPanelLayout(){ const p=document.getElementById('panel'); if(!p) return;

// draw a moon at illumination fraction p (0 = new/dark → 0.5 = half → 1 = full), waxing (lit on the right)
function drawMoonPhase(cv, p){
  const ctx=cv.getContext('2d'), W=cv.width, H=cv.height, R=Math.min(W,H)/2-1.5, cx=W/2, cy=H/2;
  ctx.clearRect(0,0,W,H);
  ctx.save(); ctx.beginPath(); ctx.arc(cx,cy,R,0,7); ctx.clip();
  ctx.fillStyle='#0c1226'; ctx.fillRect(0,0,W,H);                 // dark moon base
  const f=Math.max(0,Math.min(1,p)), tr=R*Math.cos(Math.PI*f);    // terminator semi-width (f=0→R, .5→0, 1→−R)
  ctx.fillStyle='#eaf0ff';                                        // lit silver
  ctx.beginPath();
  ctx.arc(cx,cy,R, -Math.PI/2, Math.PI/2, false);                 // right limb, top→bottom
  ctx.ellipse(cx,cy, Math.abs(tr), R, 0, Math.PI/2, -Math.PI/2, tr>0);  // terminator back to top
  ctx.closePath(); ctx.fill();
  ctx.restore();
  ctx.beginPath(); ctx.arc(cx,cy,R,0,7); ctx.strokeStyle='rgba(176,198,255,0.55)'; ctx.lineWidth=1; ctx.stroke();
}
